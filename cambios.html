<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cambios al SGI · NTT DATA</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F4F6FA;--card:#FFF;--border:#E2E8F2;--text:#1A2B42;--muted:#7A8CA0;--green:#0A7A5A;--blue:#0067B1;--amber:#B5751C;--red:#B52020;--purple:#7C3AED}body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:12px;min-height:100vh;font-size:12px}.hdr{text-align:center;margin-bottom:18px}.hdr-tit{font-size:18px;font-weight:800;color:var(--text)}.hdr-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:"DM Mono",monospace}.resumen{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}@media(max-width:800px){.resumen{grid-template-columns:repeat(2,1fr)}}.rcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}.rnum{font-size:24px;font-weight:800;line-height:1;font-family:"DM Mono",monospace;color:var(--text)}.rnum.green{color:var(--green)}.rnum.red{color:var(--red)}.rnum.blue{color:var(--blue)}.rnum.amber{color:var(--amber)}.rnum.purple{color:var(--purple)}.rlbl{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:4px}.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}.flbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.fbtn{padding:5px 12px;border:1px solid var(--border);background:#fff;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;color:#556270;font-family:inherit}.fbtn:hover{background:#FAFBFD}.fbtn.active{background:#0067B1;color:#fff;border-color:#0067B1}.fbtn .cnt{display:inline-block;background:rgba(0,0,0,.08);padding:1px 6px;border-radius:10px;margin-left:4px;font-size:10px;font-weight:700}.fbtn.active .cnt{background:rgba(255,255,255,.25)}.search{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;min-width:200px;background:#fff}.lista{display:flex;flex-direction:column;gap:10px}.c-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;border-left:4px solid var(--border)}.c-card.legal{border-left-color:var(--red)}.c-card.estructura{border-left-color:var(--purple)}.c-card.procesos{border-left-color:var(--amber)}.c-head{padding:10px 14px;cursor:pointer;display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center}.c-head:hover{background:#FAFBFD}.c-num{font-family:"DM Mono",monospace;font-size:12px;font-weight:800;color:#fff;background:#0067B1;padding:5px 10px;border-radius:5px;min-width:40px;text-align:center}.c-tit{font-size:12px;font-weight:700;color:var(--text);line-height:1.4}.c-meta{font-size:10px;color:var(--muted);margin-top:3px;font-family:"DM Mono",monospace}.c-tag{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}.c-tag.legal{background:#FDEAEA;color:var(--red)}.c-tag.estructura{background:#EDE9FE;color:var(--purple)}.c-tag.procesos{background:#FEF3C7;color:#92400E}.c-tag.estado{background:#DCFCE7;color:var(--green)}.c-tag.estado.proceso{background:#DBEAFE;color:var(--blue)}.c-toggle{font-size:14px;color:var(--muted);transition:transform .15s}.c-card.open .c-toggle{transform:rotate(180deg)}.c-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}.c-card.open .c-body{display:block}.c-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}@media(max-width:700px){.c-grid{grid-template-columns:1fr}}.c-kv{padding:8px 12px;background:#FAFBFD;border-radius:6px;border:1px solid var(--border)}.c-klbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}.c-kval{font-size:12px;color:var(--text);font-weight:600}.imp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}@media(max-width:700px){.imp{grid-template-columns:1fr}}.imp-c{padding:10px;border-radius:6px;border:1px solid var(--border);background:#fff;text-align:center}.imp-lbl{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}.imp-val{font-size:14px;font-weight:800;padding:4px 8px;border-radius:5px;display:inline-block}.imp-val.alto{background:var(--red);color:#fff}.imp-val.medio{background:#FEF3C7;color:#92400E}.imp-val.bajo{background:#DCFCE7;color:var(--green)}.imp-val.na{background:#F0F3F8;color:var(--muted)}.c-sect{margin-top:14px}.c-sect-tit{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}.c-sect-tit::before{content:"";width:3px;height:14px;background:var(--blue);border-radius:2px}.c-sect-cnt{font-size:12px;color:var(--text);line-height:1.6;padding:10px 14px;background:#FAFBFD;border-radius:6px;border-left:3px solid var(--blue)}.foot{text-align:center;font-size:10px;color:var(--muted);margin-top:18px;padding-top:12px;border-top:1px solid var(--border)}</style></head><body><div class="resumen" id="resumen"></div><div class="filtros"><span class="flbl">Tipo:</span><button class="fbtn active" data-ft="todos">Todos<span class="cnt" id="cTot">0</span></button><button class="fbtn" data-ft="Cambio Legal">Legales<span class="cnt" id="cL">0</span></button><button class="fbtn" data-ft="Cambio en estructura">Estructura<span class="cnt" id="cE">0</span></button><button class="fbtn" data-ft="Cambio en procesos">Procesos<span class="cnt" id="cP">0</span></button><input type="text" class="search" id="srch" placeholder="🔍 Buscar..."></div><div class="lista" id="lista"></div><script>var C=[{"id":0,"num":1,"fuente":"Estrategica","proposito":"Actualización de Politica para r :"Implementado"},{"id":7,"num":11,"fuente":"Mejora","proposito":"Cambio en la estructura y contenido de la BDGC","tipo":"Cambio en estructura","impacto_sgc":"Alto","impacto_sgs":"Alto","impacto_sgsi":"2025-08-28 00:00:00","recursos":"Subcontratistas","fecha":"2025-08-25","responsable":"Duty Manager, SOC Coordinator, Senior Team Lead","parte_interesada":"Responsable de SGI","comunicaciones":"Revision semestral de Gestion de Activos","capacitacion":"Base de datos de Gestion de la Configuración","resp_medicion":"Sin observaciones","medicion":"","evidencia":"Otro","observaciones":"","estado":"Implementado"},{"id":8,"num":9,"fuente":"Estrategica","proposito":"Desarrollo e implementación del Portal de Administración del SGI (HTML interactivo) y su Viewer de consulta para publicación en SharePoint, consolidando en una sola herramienta el control de requisitos normativos, SOA, tareas operativas, hallazgos, objetivos, riesgos, gestión de cambios, calendario de auditorías y revisión por la dirección.","tipo":"Cambio en estructura","impacto_sgc":"Alto","impacto_sgs":"Alto","impacto_sgsi":"Alto","recursos":"Documental, Herramientas","fecha":"2026-03-29","responsable":"Coordinadora del SGI","parte_interesada":"Alta dirección, Responsables de norma, Auditores internos","comunicaciones":"Publicación del Viewer en SharePoint para consulta de las áreas involucradas. Comunicación a responsables de norma sobre la nueva herramienta de seguimiento.","capacitacion":"Capacitación a subordinada en el uso del portal de administración y el flujo de actualización CSV-Viewer.","resp_medicion":"Coordinadora del SGI","medicion":"Verificar que los 12 módulos del portal reflejen correctamente la información del SGI y que el Viewer publicado en SharePoint sea accesible para las áreas de consulta.","evidencia":"Portal de Administración SGI (HTML) y Viewer SGI (HTML estático) publicado en SharePoint.","observaciones":"El portal consolida información previamente dispersa en múltiples archivos Excel, Word y presentaciones. Se desarrolló con tecnologías web estándar (HTML, CSS, JavaScript) sin dependencias externas. La persistencia de datos opera mediante exportación e importación de archivos CSV.","estado":"Implementado"},{"id":9,"num":10,"fuente":"Estrategica","proposito":"Implementación de Portal de Control del SGI — herramienta HTML para la administración integral del sistema de gestión (requisitos, controles, hallazgos, riesgos, objetivos, tareas operativas, auditorías y revisión por la dirección) con viewer estático para publicación en SharePoint.","tipo":"Cambio en estructura","impacto_sgc":"Alto — Centraliza el control y seguimiento de los 135 requisitos normativos, trazabilidad documental y gestión de hallazgos del SGC.","impacto_sgs":"Alto — Integra las 202 tareas operativas del SGS, seguimiento a SLAs y vinculación con el plan de auditoría interna.","impacto_sgsi":"Alto — Incorpora los 93 controles del SOA con vinculación bidireccional a los 28 riesgos evaluados, respondiendo a la OBS-1 de Compecer sobre trazabilidad de controles.","recursos":"Documental, Herramientas","fecha":"2026-03-29","responsable":"Mizraim Alcázar — Coordinadora del SGI","parte_interesada":"Alta dirección, Responsables de norma, Equipo de auditoría interna","comunicaciones":"Publicación del viewer en SharePoint para consulta de Alta Dirección (CFO, Sales Director, COO). Comunicación al equipo SGI sobre el uso del portal de administración.","capacitacion":"Inducción al uso del portal para la persona de apoyo del SGI.","resp_medicion":"Mizraim Alcázar","medicion":"Verificar que el portal refleje el 100% de los requisitos, controles, hallazgos y riesgos del SGI. Validar consistencia entre admin y viewer publicado.","evidencia":"SGI_Control_App.html (portal admin) y SGI_NTT_Viewer.html (viewer SP) publicados y en operación.","observaciones":"Herramienta administrativa de control desarrollada por la Coordinación del SGI como parte de la mejora continua del sistema (Cl. 10.1). Sustituye el control mediante múltiples archivos independientes por un portal unificado. El viewer estático (zero-JS) se publica en SharePoint para consulta ejecutiva.","estado":"Implementado"}];var FT="todos";var SR="";function tipoClass(t){var x=(t||"").toLowerCase();if(x.indexOf("legal")>=0)return "legal";if(x.indexOf("estructura")>=0)return "estructura";if(x.indexOf("proceso")>=0)return "procesos";return ""}function impClass(v){var x=(v||"").toLowerCase();if(x==="alto")return "alto";if(x==="medio")return "medio";if(x==="bajo")return "bajo";return "na"}function estCls(e){var x=(e||"").toLowerCase();if(x.indexOf("implement")>=0||x.indexOf("cerrad")>=0)return "estado";if(x.indexOf("proceso")>=0)return "estado proceso";return "estado"}function dlim(s){return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}function render(){var cL=C.filter(function(c){return c.tipo==="Cambio Legal"}).length;var cE=C.filter(function(c){return c.tipo==="Cambio en estructura"}).length;var cP=C.filter(function(c){return c.tipo==="Cambio en procesos"}).length;var cI=C.filter(function(c){return (c.estado||"").toLowerCase().indexOf("implement")>=0}).length;document.getElementById("resumen").innerHTML='<div class="rcard"><div class="rnum">'+C.length+'</div><div class="rlbl">Cambios totales</div></div><div class="rcard"><div class="rnum red">'+cL+'</div><div class="rlbl">Legales</div></div><div class="rcard"><div class="rnum purple">'+cE+'</div><div class="rlbl">Estructura</div></div><div class="rcard"><div class="rnum green">'+cI+'</div><div class="rlbl">Implementados</div></div>';document.getElementById("cTot").textContent=C.length;document.getElementById("cL").textContent=cL;document.getElementById("cE").textContent=cE;document.getElementById("cP").textContent=cP;Array.from(document.querySelectorAll(".fbtn")).forEach(function(b){b.classList.toggle("active",b.dataset.ft===FT)});var lst=C.filter(function(c){if(FT!=="todos"&&c.tipo!==FT)return false;if(SR){var q=SR.toLowerCase();return ((c.num||"")+" "+(c.proposito||"")+" "+(c.fuente||"")+" "+(c.responsable||"")).toString().toLowerCase().indexOf(q)>=0}return true});var html="";lst.forEach(function(c){var tc=tipoClass(c.tipo);html+='<div class="c-card '+tc+'">';html+='<div class="c-head" onclick="this.parentNode.classList.toggle(\'open\')">';html+='<span class="c-num">#'+dlim(c.num||c.id+1)+'</span>';html+='<div><div class="c-tit">'+dlim(c.proposito||"(sin propósito)")+'</div><div class="c-meta">Fuente: '+dlim(c.fuente||"—")+(c.fecha?" · "+dlim(c.fecha):"")+(c.responsable?" · "+dlim(c.responsable):"")+'</div></div>';html+='<span class="c-tag '+tc+'">'+dlim(c.tipo||"—")+'</span>';html+='<span class="c-tag '+estCls(c.estado)+'">'+dlim(c.estado||"—")+'</span>';html+='<span class="c-toggle">▼</span>';html+='</div><div class="c-body">';html+='<div class="c-sect"><div class="c-sect-tit">Impacto por sistema</div><div class="imp">';html+='<div class="imp-c"><div class="imp-lbl">ISO 9001 (SGC)</div><span class="imp-val '+impClass(c.impacto_sgc)+'">'+(c.impacto_sgc||"N/A")+'</span></div>';html+='<div class="imp-c"><div class="imp-lbl">ISO 20000-1 (SGS)</div><span class="imp-val '+impClass(c.impacto_sgs)+'">'+(c.impacto_sgs||"N/A")+'</span></div>';html+='<div class="imp-c"><div class="imp-lbl">ISO 27001 (SGSI)</div><span class="imp-val '+impClass(c.impacto_sgsi)+'">'+(c.impacto_sgsi||"N/A")+'</span></div>';html+='</div></div>';html+='<div class="c-grid">';html+='<div class="c-kv"><div class="c-klbl">Recursos</div><div class="c-kval">'+dlim(c.recursos||"—")+'</div></div>';html+='<div class="c-kv"><div class="c-klbl">Parte interesada</div><div class="c-kval">'+dlim(c.parte_interesada||"—")+'</div></div>';html+='<div class="c-kv"><div class="c-klbl">Responsable</div><div class="c-kval">'+dlim(c.responsable||"—")+'</div></div>';html+='</div>';if(c.comunicaciones){html+='<div class="c-sect"><div class="c-sect-tit">Comunicaciones</div><div class="c-sect-cnt">'+dlim(c.comunicaciones)+'</div></div>'}if(c.capacitacion){html+='<div class="c-sect"><div class="c-sect-tit">Capacitación</div><div class="c-sect-cnt">'+dlim(c.capacitacion)+'</div></div>'}if(c.medicion){html+='<div class="c-sect"><div class="c-sect-tit">Medición · Responsable: '+dlim(c.resp_medicion||"—")+'</div><div class="c-sect-cnt">'+dlim(c.medicion)+'</div></div>'}if(c.evidencia){html+='<div class="c-sect"><div class="c-sect-tit">Evidencia</div><div class="c-sect-cnt">'+dlim(c.evidencia)+'</div></div>'}if(c.observaciones){html+='<div class="c-sect"><div class="c-sect-tit">Observaciones</div><div class="c-sect-cnt">'+dlim(c.observaciones)+'</div></div>'}html+='</div></div>';});document.getElementById("lista").innerHTML=html||'<div style="padding:30px;text-align:center;color:#7A8CA0;font-size:12px;background:#fff;border-radius:10px;border:1px solid #E2E8F2">No hay cambios que coincidan con el filtro</div>';}Array.from(document.querySelectorAll(".fbtn")).forEach(function(b){b.addEventListener("click",function(){FT=this.dataset.ft;render()})});document.getElementById("srch").addEventListener("input",function(){SR=this.value;render()});render();</script></body></html>
