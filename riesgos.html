<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Riesgos del SGI · NTT DATA</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F4F6FA;--card:#FFF;--border:#E2E8F2;--text:#1A2B42;--muted:#7A8CA0;--green:#0A7A5A;--blue:#0067B1;--amber:#B5751C;--red:#B52020;--crit:#7A0000}body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:12px;min-height:100vh;font-size:12px}.hdr{text-align:center;margin-bottom:18px}.hdr-tit{font-size:18px;font-weight:800;color:var(--text)}.hdr-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:"DM Mono",monospace}.resumen{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}@media(max-width:800px){.resumen{grid-template-columns:repeat(2,1fr)}}.rcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}.rnum{font-size:22px;font-weight:800;line-height:1;font-family:"DM Mono",monospace;color:var(--text)}.rnum.green{color:var(--green)}.rnum.red{color:var(--red)}.rnum.blue{color:var(--blue)}.rnum.amber{color:var(--amber)}.rnum.crit{color:var(--crit)}.rlbl{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:4px}.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}.flbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.fbtn{padding:5px 12px;border:1px solid var(--border);background:#fff;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;color:#556270;font-family:inherit}.fbtn:hover{background:#FAFBFD}.fbtn.active{background:#0067B1;color:#fff;border-color:#0067B1}.fbtn .cnt{display:inline-block;background:rgba(0,0,0,.08);padding:1px 6px;border-radius:10px;margin-left:4px;font-size:10px;font-weight:700}.fbtn.active .cnt{background:rgba(255,255,255,.25)}.search{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;min-width:200px;background:#fff}.lista{display:flex;flex-direction:column;gap:10px}.r-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;border-left:4px solid var(--border)}.r-card.crit{border-left-color:var(--crit)}.r-card.alto{border-left-color:var(--red)}.r-card.mod{border-left-color:var(--amber)}.r-card.tol{border-left-color:var(--blue)}.r-card.bajo{border-left-color:var(--green)}.r-head{padding:10px 14px;cursor:pointer;display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center}.r-head:hover{background:#FAFBFD}.r-cod{font-family:"DM Mono",monospace;font-size:10px;font-weight:700;color:var(--text);background:#F0F3F8;padding:3px 7px;border-radius:4px;white-space:nowrap}.r-tit{font-size:12px;font-weight:700;color:var(--text);line-height:1.4}.r-meta{font-size:10px;color:var(--muted);margin-top:3px;font-family:"DM Mono",monospace}.r-nivel{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:800;white-space:nowrap;font-family:"DM Mono",monospace}.r-nivel.crit{background:var(--crit);color:#fff}.r-nivel.alto{background:var(--red);color:#fff}.r-nivel.mod{background:#FEF3C7;color:#92400E}.r-nivel.tol{background:#DBEAFE;color:var(--blue)}.r-nivel.bajo{background:#DCFCE7;color:var(--green)}.r-toggle{font-size:14px;color:var(--muted);transition:transform .15s}.r-card.open .r-toggle{transform:rotate(180deg)}.r-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}.r-card.open .r-body{display:block}.r-sect{margin-top:14px}.r-sect-tit{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}.r-sect-tit::before{content:"";width:3px;height:14px;background:var(--blue);border-radius:2px}.r-sect-cnt{font-size:12px;color:var(--text);line-height:1.6;padding:10px 14px;background:#FAFBFD;border-radius:6px;border-left:3px solid var(--blue)}.r-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}@media(max-width:700px){.r-grid{grid-template-columns:1fr}}.r-kv{padding:8px 12px;background:#FAFBFD;border-radius:6px;border:1px solid var(--border)}.r-klbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}.r-kval{font-size:12px;color:var(--text);font-weight:600}.cia{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.cia-c{padding:10px;border-radius:6px;border:1px solid var(--border);background:#fff;text-align:center}.cia-lbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}.cia-val{font-size:24px;font-weight:800;line-height:1;font-family:"DM Mono",monospace}.cia-c.c1 .cia-val,.cia-c.c2 .cia-val{color:var(--green)}.cia-c.c3 .cia-val{color:var(--amber)}.cia-c.c4 .cia-val,.cia-c.c5 .cia-val{color:var(--red)}.calc{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}@media(max-width:700px){.calc{grid-template-columns:repeat(2,1fr)}}.calc-c{padding:10px;border-radius:6px;background:#FAFBFD;border:1px solid var(--border);text-align:center}.calc-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}.calc-val{font-size:18px;font-weight:800;color:var(--text);font-family:"DM Mono",monospace}.foot{text-align:center;font-size:10px;color:var(--muted);margin-top:18px;padding-top:12px;border-top:1px solid var(--border)}</style></head><body><div class="resumen" id="resumen"></div><div class="filtros"><span class="flbl">Nivel:</span><button class="fbtn active" data-fn="todos">Todos<span class="cnt" id="cT">0</span></button><button class="fbtn" data-fn="4. Crítico">Críticos<span class="cnt" id="cC">0</span></button><button class="fbtn" data-fn="3. Moderado">Moderados<span class="cnt" id="cM">0</span></button><button class="fbtn" data-fn="2. Tolerable">Tolerables<span class="cnt" id="cTo">0</span></button><button class="fbtn" data-fn="1. Bajo">Bajos<span class="cnt" id="cB">0</span></button><input type="text" class="search" id="srch" placeholder="🔍 Buscar..."></div><div class="lista" id="lista"></div><script>var R=[{"id":0,"sg":"SGSI","tipo":"Riesgo","clave":"R-SGSI-01","activo":"Contraseñas débiles","descripcion":"Uso de contraseñas débiles o reutilizadas que permiten accesos no autorizados a consolas administrativas, SIEM, firewalls, servidores o herramientas del SOC/NOC.","clasificacion":"Seguridad de la información","causa":"Políticas de contraseñas obsoletas, MFA no obligatorio, cuentas heredadas, no rotación y falta de controles centralizados de identidad.","efecto":"Acceso no autorizado a infraestructura crítica, alteración de configuraciones, manipulación de alertas, evasión de monitoreo, pérdida de trazabilidad y riesgo de intrusión mayor.","confidencialidad":4,"integridad":3,"disponibilidad":1,"suma_cia":8,"impacto":2.8,"probabilidad":4,"resultado":11.2,"nivel":"3. Moderado","respuesta":"Reducir o mitigar","acciones":"Implementar políticas robustas de contraseñas + MFA obligatorio. Forzar rotación automática","control_iso":"A.9.3.1","fecha_revision":"2025-11-19","fecha_compromiso":"2026-03-23","responsable":"Kevin Marin","naturaleza_control":"Preventivo","peso_control":4,"implementacion":"Sistematizada","impl_valor":3,"peso_total":12,"estatus":"Implementado","funciona":"Si","comentarios":"","control_soa":"5.17","control_soa_nombre":"Información de autenticación"},{"id":1,"sg":"SGSI","tipo":"Riesgo","clave":"R-SGSI-02","activo":"Seguridad en redes internas","descripcion":"Controles y procesos para proteger la LAN/VLAN, switches, routers, Wi‑Fi y movimiento lateral.","clasificacion":"Seguridad de la información","causa":"Configuraciones erróneas, falta de segmentación, dispositivos sin parches, controles de acceso débiles.","efecto":"Exfiltración de datos, manipulación de telemetría y pérdida de conectividad/servicios.","confidencialidad":4,"integridad":4,"disponibilidad":5,"suma_cia":13,"impacto":4.3,"probabilidad":4,"resultado":17.2,"nivel":"4. Crítico","respuesta":"Reducir o mitigar","acciones":"Implementar microsegmentación  y gestión de accesos privilegiados","control_iso":"A.13.1.1","fecha_revision":"2025-11-19","fecha_compromiso":"2026-03-30","responsable":"Kevin Marin","naturaleza_control":"Preventivo","peso_control":4,"implementacion":"Sistematizada","impl_valor":3,"peso_total":12,"estatus":"Implementado","funciona":"Si","comentarios":"Priorizar controles de cuentas privilegiadas, registro (logging) y MFA.","control_soa":"8.20","control_soa_nombre":""},{"id":2,"sg":"SGSI","tipo":"Riesgo","clave":"R-SGSI-03","activo":"Gestión de accesos a sistemas","descripcion":"Controlar y otorgar permisos de usuarios y cuentas privilegiadas en sistemas del NOC/SOC.","clasificacion":"Seguridad de la información","causa":"Accesos mal definidos, provisión/revocación tardía, falta de roles y controles.","efecto":"Acceso no autorizado, fuga de información, cambios indebidos o interrupciones por errores.","confidencialidad":4,"integridad":3,"disponibilidad":3,"suma_cia":10,"impacto":3.4,"probabilidad":4,"resultado":13.6,"nivel":"3. Moderado","respuesta":"Reducir o mitigar","acciones":"Implementar un sistema de gestión de identidades o accesos para garantizar control centralizado de cuentas","control_iso":"Control A.9.2.1","fecha_revision":"2025-11-19","fecha_compromiso":"2026-04-06","responsable":"Kevin Marin","naturaleza_control":"Preventivo","peso_control":4,"implementacion":"Automatizada","impl_valor":4,"peso_total":16,"estatus":"Implementado","funciona":"Si","comentarios":"Priorizar controles de cuentas privilegiadas, registro (logging) y MFA desde el inicio; planificar roles y procesos de revocación.","control_soa":"5.18","control_soa_nombre":"Derechos de acceso"},{"id":3,"sg":"GGS","tipo":"Riesgo","clave":"R-GGS-04","activo":"Gestión de solicitudes","descripcion":"Proceso para recibir, validar, aprobar y ejecutar solicitudes de acceso, cambios o servicios en el NOC/SOC, sin criterios estandarizados, lo que puede generar errores, retrasos o aprobaciones incorrectas.","clasificacion":"Operativo","causa":"Falta de flujos definidos, ausencia de herramienta de tickets completa y aprobaciones manuales inconsistentes.","efecto":"Retrasos, errores en aprovisionamiento, accesos indebidos o tareas no registradas.","confidencialidad":3,"integridad":3,"disponibilidad":4,"suma_cia":10,"impacto":3.3,"probabilidad":4,"resultado":13.2,"nivel":"3. Moderado","respuesta":"Reducir o mitigar","acciones":"Falta de un proceso estandarizado para recibir, validar, aprobar y ejecutar solicitudes de acceso/cambios/servicios.","control_iso":"No aplica","fecha_revision":"2026-01-19","fecha_compromiso":"Pendiente por dependencia de sistema de solicitudes","responsable":"Kevin Marin","naturaleza_control":"Correctivo","peso_control":2,"implementacion":"Sistematizada","impl_valor":3,"peso_total":6,"estatus":"Implementado","funciona":"No","comentarios":"Sistematizada (con pasos de automatización progresiva)","control_soa":"","control_soa_nombre":""},{"id":4,"sg":"SGI","tipo":"Riesgo","clave":"R-SGI-05","activo":"Capacitación del personal","descripcion":"Baja competencia técnica","clasificacion":"Calidad","causa":"Falta de formación formal, alta rotación y ausencia de materiales y ejercicios prácticos.","efecto":"Errores operativos, respuesta lenta a incidentes, manejo inadecuado de credenciales y no cumplimiento de procedimientos.","confidencialidad":3,"integridad":3,"disponibilidad":4,"suma_cia":10,"impacto":3.3,"probabilidad":4,"resultado":13.2,"nivel":"3. Moderado","respuesta":"Reducir o mitigar","acciones":"Implementar programa de capacitación","control_iso":"No aplica","fecha_revision":"2025-11-19","fecha_compromiso":"Pendiente por dependencia de validar si el programa es interno o proporcionado por la empresa","responsable":"Kevin Marin","naturaleza_control":"Preventivo","peso_control":4,"implementacion":"Sistematizada","impl_valor":3,"peso_total":12,"estatus":"Implementado","funciona":"Si","comentarios":"La capacitación es una oportunidad de alto impacto y relativamente fácil de ejecutar; además de mitigar riesgos mejora eficiencia y respuesta operativa, por lo que conviene invertir para obtener beneficios sostenibles. Implementación : Sistematizada - Usar  cursos, seguimiento y métricas (automatizable) combinado con sesiones prácticas presenciales/virtuales; así se asegura cumplimiento, trazabilidad y repetibilidad.","control_soa":"","control_soa_nombre":""},{"id":5,"sg":"GGS","tipo":"Riesgo","clave":"R-GGS-06","activo":"Disponibilidad de servicios","descripcion":"Interrupciones recurrentes del servicio por fallas técnicas o falta de redundancia.","clasificacion":"Tecnológico","causa":"Falta de redundancia o  procedimientos de recuperación incompletos.","efecto":"Interrupciones de servicio, impacto en clientes/operaciones y pérdida de confianza.","confidencialidad":2,"integridad":3,"disponibilidad":5,"suma_cia":10,"impacto":3.2,"probabilidad":4,"resultado":12.8,"nivel":"3. Moderado","respuesta":"Reducir o mitigar","acciones":"Definir requerimientos de disponibilidad del servicio (objetivos, criticidad y tiempos). Asegurar esquema de alta disponibilidad a nivel servicio y coordinación de componentes (energía, conectividad y herramientas críticas). Validar mediante pruebas periódicas y monitoreo continuo.","control_iso":"No aplica","fecha_revision":"2026-01-19","fecha_compromiso":"Pendiente por dependencias","responsable":"Kevin Marin","naturaleza_control":"Preventivo","peso_control":4,"implementacion":"Sistematizada","impl_valor":3,"peso_total":12,"estatus":"Implementado","funciona":"Si","comentarios":"Requiere herramientas  y procesos estandarizados; incluir automatización progresiva para reducir tiempo de respuesta.","control_soa":"","control_soa_nombre":""},{"id":6,"sg":"SGSI","tipo":"Riesgo","clave":"R-SGSI-07","activo":"Acceso remoto","descripcion":"Accesos remotos sin controles de seguridad adecuados","clasificacion":"Seguridad de la información","causa":"Credenciales comprometidas, endpoints sin correcta postura de seguridad, configuraciones incorrectas, privilegios excesivos, falta de monitoreo.","efecto":"Exfiltración  de datos, modificaciones no autorizadas, persistencia de atacante, interrupción de servicios.","confidencialidad":4,"integridad":4,"disponibilidad":3,"suma_cia":11,"impacto":3.7,"probabilidad":5,"resultado":18.5,"nivel":"4. Crítico","respuesta":"Reducir o mitigar","acciones":"Implementar acceso remoto seguro a los sistemas y plataformas del SGSI mediante VPN con MFA y validación de postura del dispositivo. Restringir y revisar periódicamente los privilegios de acceso remoto. Establecer monitoreo continuo a través de registros de autenticación y alertas por intentos de acceso o inicios de sesión anómalos.","control_iso":"A.13.2.1","fecha_revision":"2026-01-19","fecha_compromiso":"2026-04-30","responsable":"Kevin Marin","naturaleza_control":"Preventivo","peso_control":4,"implementacion":"Sistematizada","impl_valor":3,"peso_total":12,"estatus":"Implementado","funciona":"No","comentarios":"Implementar MFA, posture check, VPN Zero-Trust y revisar privilegios de acceso remoto. Automatizar alertas de inicio de sesión sospechoso.","control_soa":"5.14","control_soa_nombre":"Transferencia de información"},{"id":7,"sg":"SGSI","tipo":"Riesgo","clave":"R-SGSI-08","activo":"Errores humanos en respuesta a incidentes","descripcion":"Decisiones incorrectas ante eventos red / seguridad","clasificacion":"Riesgo operacional / humano.","causa":"Falta de capacitación, ausencia de playbooks/estándares, fatiga, presión, herramientas inmaduras o interfaces confusas.","efecto":"Respuestas incorrectas que agravan el incidente, interrupciones de servicio, pérdida/modificación de evidencias, exposición de datos.","confidencialidad":3,"integridad":3,"disponibilidad":4,"suma_cia":10,"impacto":3.3,"probabilidad":5,"resultado":16.5,"nivel":"4. Crítico","respuesta":"Reducir o mitigar","acciones":"Crear y mantener playbooks, runbooks y checklists de respuesta a incidentes, así como formación obligatoria para el personal involucrado. Establecer un proceso de revisión y actualización periódica de estos documentos con base en cambios operativos y lecciones aprendidas de incidentes.","control_iso":"A.16.1.5","fecha_revision":"2026-01-19","fecha_compromiso":"Pendiente por validación y puesta a pun to de procesos y playbooks o runbooks adecuados","responsable":"Kevin Marin","naturaleza_control":"Preventivo","peso_control":4,"implementacion":"Sistematizada","impl_valor":3,"peso_total":12,"estatus":"Implementado","funciona":"Si","comentarios":"Establecer procesos, runbooks, checklists y procedimientos estandarizados,  automatizar partes (p. ej. respuestas repetitivas) vendrá después, pero la base debe ser sistematización para consistencia y trazabilidad.","control_soa":"5.26","control_soa_nombre":"Respuesta a incidentes de seguridad"},{"id":8,"sg":"SGC","tipo":"Riesgo","clave":"R-SGC-09","activo":"Planificación de propuesta servicio","descripcion":"Planificación ineficiente de despliegue de nuevos servicios/monitoreos","clasificacion":"Operativo","causa":"Falta de personal especializado, falta de coordinación y planeación deficiente.","efecto":"Retraso en presentación de propuesta afectando, la ejecución del servicio de NOC/SOC","confidencialidad":1,"integridad":1,"disponibilidad":1,"suma_cia":3,"impacto":1,"probabilidad":3,"resultado":3,"nivel":"1. Bajo","respuesta":"Reducir o mitigar","acciones":"Establecer un proceso de planificación y seguimiento para el despliegue de nuevos servicios y monitoreos, que contemple calendario, priorización, asignación de responsables y control de avances por implementación. Utilizar una
