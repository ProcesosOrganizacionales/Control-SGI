<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hallazgos del SGI · NTT DATA</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F4F6FA;--card:#FFF;--border:#E2E8F2;--text:#1A2B42;--muted:#7A8CA0;--green:#0A7A5A;--blue:#0067B1;--amber:#B5751C;--red:#B52020;--purple:#5A28A8}body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:12px;min-height:100vh;font-size:12px}.hdr{text-align:center;margin-bottom:18px}.hdr-tit{font-size:18px;font-weight:800;color:var(--text)}.hdr-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:"DM Mono",monospace}.resumen{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}@media(max-width:800px){.resumen{grid-template-columns:repeat(2,1fr)}}.rcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}.rnum{font-size:24px;font-weight:800;line-height:1;font-family:"DM Mono",monospace;color:var(--text)}.rnum.green{color:var(--green)}.rnum.red{color:var(--red)}.rnum.blue{color:var(--blue)}.rnum.amber{color:var(--amber)}.rlbl{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:4px}.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}.flbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.fbtn{padding:5px 12px;border:1px solid var(--border);background:#fff;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;color:#556270;font-family:inherit}.fbtn:hover{background:#FAFBFD}.fbtn.active{background:#0067B1;color:#fff;border-color:#0067B1}.fbtn .cnt{display:inline-block;background:rgba(0,0,0,.08);padding:1px 6px;border-radius:10px;margin-left:4px;font-size:10px;font-weight:700}.fbtn.active .cnt{background:rgba(255,255,255,.25)}.search{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;min-width:200px;background:#fff}.lista{display:flex;flex-direction:column;gap:10px}.h-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}.h-head{padding:10px 14px;cursor:pointer;display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center}.h-head:hover{background:#FAFBFD}.h-cod{font-family:"DM Mono",monospace;font-size:10px;font-weight:700;color:var(--text);background:#F0F3F8;padding:3px 7px;border-radius:4px;white-space:nowrap}.h-cod.ext{background:#FDEAEA;color:var(--red)}.h-cod.int{background:#EBF4FD;color:var(--blue)}.h-tit{font-size:12px;font-weight:700;color:var(--text);line-height:1.4}.h-meta{font-size:10px;color:var(--muted);margin-top:3px;font-family:"DM Mono",monospace}.h-tag{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}.h-tag.menor{background:#FDEAEA;color:var(--red)}.h-tag.mayor{background:var(--red);color:#fff}.h-tag.obs{background:#FEF3C7;color:#92400E}.h-tag.om{background:#DBEAFE;color:var(--blue)}.h-tag.estado{background:#DCFCE7;color:var(--green)}.h-toggle{font-size:14px;color:var(--muted);transition:transform .15s}.h-card.open .h-toggle{transform:rotate(180deg)}.h-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}.h-card.open .h-body{display:block}.h-sect{margin-top:14px}.h-sect-tit{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}.h-sect-tit::before{content:"";width:3px;height:14px;background:var(--blue);border-radius:2px}.h-sect-cnt{font-size:12px;color:var(--text);line-height:1.6;padding:10px 14px;background:#FAFBFD;border-radius:6px;border-left:3px solid var(--blue)}.h-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}@media(max-width:700px){.h-grid{grid-template-columns:1fr}}.h-kv{padding:8px 12px;background:#FAFBFD;border-radius:6px;border:1px solid var(--border)}.h-klbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}.h-kval{font-size:12px;color:var(--text);font-weight:600}.ish{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}@media(max-width:700px){.ish{grid-template-columns:1fr}}.ish-c{padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:#fff}.ish-tit{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}.ish-cnt{font-size:11px;color:#556270;line-height:1.5}.ish-c.metodo .ish-tit{color:var(--blue)}.ish-c.proceso .ish-tit{color:var(--purple)}.ish-c.norma .ish-tit{color:#7C3AED}.ish-c.personas .ish-tit{color:var(--green)}.ish-c.origen .ish-tit{color:var(--amber)}.ish-c.accion .ish-tit{color:var(--red)}.empty{padding:30px;text-align:center;color:var(--muted);font-size:12px;background:var(--card);border-radius:10px;border:1px solid var(--border)}.foot{text-align:center;font-size:10px;color:var(--muted);margin-top:18px;padding-top:12px;border-top:1px solid var(--border)}</style></head><body><div class="resumen" id="resumen"></div><div class="filtros"><span class="flbl">Origen:</span><button class="fbtn" data-fo="todos">Todos<span class="cnt" id="cTd">0</span></button><button class="fbtn" data-fo="Auditoría Externa">Externos<span class="cnt" id="cEx">0</span></button><button class="fbtn" data-fo="Auditoría Interna">Internos<span class="cnt" id="cIn">0</span></button><input type="text" class="search" id="srch" placeholder="🔍 Buscar..."></div><div class="lista" id="lista"></div><script>var H=[{"id":0,"codigo":"EXT-2025-001","origen":"Auditoría Externa","fuente":"Compecer — Recertificación Sep 2025","fecha_deteccion":"2025-09-12","normas":"ISO 9001, ISO 20000-1, ISO 27001","clausula":"6.1","requisito":"Acciones para abordar riesgos y oportunidades","clasificacion":"Observación","descripcion":"Inconsistencias en la aplicabilidad de controles ISO 27001 en la matriz de riesgos. El riesgo R-GGS-17 (Configuración de servicios, clasificado como crítico) no tenía asignado el control A.8.9. El documento de riesgos estaba en revisión sin versión final.","estado":"Cerrado","causa_raiz":"Causa raíz (Ishikawa — Métodos/Materiales): Durante la transición de ISO 27001:2013 a 2022, el mapeo de controles del Anexo A no se actualizó de forma simultánea en la matriz de riesgos. El personal responsable de la valoración de riesgos utilizó la nomenclatura antigua sin validar la equivalencia con los nuevos controles 2022. Causa raíz: falta de procedimiento de actualización sincronizada entre SOA, matriz de riesgos y registro de tratamiento al hacer cambios de versión normativa.","metodo_analisis":"Ishikawa","plan_accion":"1. Actualizar la tabla de equivalencia de controles ISO 27001:2013→2022 en todos los registros de riesgo (R-GGS-17 y derivados). 2. Revisar la totalidad de la matriz de riesgos para verificar que los controles referenciados correspondan a la versión 2022. 3. Implementar revisión cruzada SOA↔Riesgos como actividad obligatoria en la revisión semestral del SGSI. 4. Registrar la vinculación actualizada en el Portal SGI con los badges de trazabilidad bidireccional. Responsable: Antonio Lazcano / Mizraim Alcázar. Fecha compromiso: 31/03/2026.","responsable_accion":"Antonio Lazcano / Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"Validado mediante el Portal SGI — los 28 riesgos tienen control SOA vinculado y verificado en revisión por la dirección jul-2026.","fecha_cierre":"2026-03-31","evidencia_cierre":"Portal SGI — 28 riesgos con control SOA vinculado; tabla de equivalencia 2013→2022 actualizada","observaciones":"","ish_metodo":"Sin procedimiento de actualización sincronizada entre SOA, matriz de riesgos y registro de tratamiento al cambiar versión normativa ISO 27001","ish_proceso":"El proceso de transición 2013→2022 no incluyó paso obligatorio de actualización simultánea del mapeo de controles en la matriz de riesgos","ish_norma":"ISO 27001:2022 Cl. 6.1 — R-GGS-17 (riesgo crítico) sin control A.8.9 asignado; documento de riesgos en revisión sin versión final aprobada","ish_personas":"El personal de valoración de riesgos usó nomenclatura 2013 sin validar equivalencia con los nuevos controles 2022 por falta de formación en la transición","ish_origen":"Transición ISO 27001:2013→2022 acelerada por recertificación; sincronización documental entre SOA, matriz de riesgos y registro de tratamiento no planificada","ish_accion":"Actualizar tabla equivalencia controles 2013→2022 en todos los registros. Implementar revisión cruzada SOA↔Riesgos como actividad obligatoria semestral del SGSI"},{"id":1,"codigo":"EXT-2025-002","origen":"Auditoría Externa","fuente":"Compecer — Recertificación Sep 2025","fecha_deteccion":"2025-09-12","normas":"ISO 9001, ISO 20000-1, ISO 27001","clausula":"6.3","requisito":"Gestión de cambios","clasificacion":"Observación","descripcion":"El SGI está en reingeniería y los cambios en procesos y documentos no se han gestionado conforme al procedimiento SGI-PL-01. Se requiere clarificar el manejo de cambios en función de: a) Sistema de gestión, b) Procesos, c) Servicios, d) Seguridad de la información.","estado":"Cerrado","causa_raiz":"Causa raíz (Ishikawa — Métodos/Mano de obra): La reingeniería del SGI se ejecutó como proyecto de mejora continua acelerado, priorizando el resultado sobre el proceso. Los responsables de proceso documentaron cambios operativos sin pasar por el flujo formal de gestión de cambios (BPM-FO-10) debido a desconocimiento del procedimiento y urgencia operativa. Causa raíz: ausencia de un punto de control obligatorio que vincule cualquier modificación documental con el registro de cambios del SGI.","metodo_analisis":"Ishikawa","plan_accion":"1. Difundir el procedimiento de gestión de cambios SGI-PL a todos los responsables de proceso y norma. 2. Registrar retroactivamente en BPM-FO-10 todos los cambios ejecutados durante la reingeniería. 3. Establecer en el calendario SGI una revisión mensual del registro de cambios como actividad de seguimiento. 4. Agregar en el Portal SGI un campo de alerta en el módulo de cambios que exija justificación antes de cerrar cualquier cambio. Responsable: Mizraim Alcázar. Fecha compromiso: 31/03/2026.","responsable_accion":"Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"10 cambios registrados en BPM-FO-10 y en el Portal SGI. Procedimiento difundido en reunión de equipo SGI.","fecha_cierre":"2026-03-31","evidencia_cierre":"BPM-FO-10 con 10 cambios registrados retroactivamente; minuta de difusión del procedimiento al equipo SGI","observaciones":"","ish_metodo":"Ausencia de punto de control obligatorio que vincule cualquier modificación documental con el registro de cambios del SGI (BPM-FO-10) antes de publicar","ish_proceso":"Los responsables de proceso omitieron el flujo formal de gestión de cambios (SGI-PL-01) durante la reingeniería por desconocimiento y urgencia operativa","ish_norma":"ISO 9001/20000-1/27001 Cl. 6.3 — Cambios al SGI no gestionados conforme al procedimiento SGI-PL-01; sin evidencia de clasificación a), b), c), d)","ish_personas":"Responsables de proceso desconocían el procedimiento SGI-PL-01 de gestión de cambios; la urgencia operativa priorizó el resultado sobre el proceso formal","ish_origen":"Reingeniería del SGI ejecutada como proyecto acelerado de mejora continua; cambios documentales realizados directamente sin pasar por flujo de aprobación","ish_accion":"Difundir SGI-PL-01 a todos los responsables de proceso. Registrar retroactivamente en BPM-FO-10. Revisión mensual del registro de cambios como actividad de calendario"},{"id":2,"codigo":"EXT-2025-003","origen":"Auditoría Externa","fuente":"Compecer — Recertificación Sep 2025","fecha_deteccion":"2025-09-12","normas":"ISO 9001, ISO 20000-1, ISO 27001","clausula":"7.5","requisito":"Información documentada","clasificacion":"Observación","descripcion":"En la reingeniería del proceso, documentos nuevos como el de riesgos no cuentan con nomenclatura conforme al procedimiento de control documental SGI-07-PR-03.","estado":"Cerrado","causa_raiz":"Causa raíz (Ishikawa — Métodos/Materiales): En la creación de nuevos documentos durante la reingeniería (procedimiento de riesgos, formatos de auditoría), no se consultó el procedimiento de control documental SGI-PO para asignar nomenclatura. El proceso fue reactivo: primero se creó el documento y después se intentó integrarlo al sistema de control. Causa raíz: falta de un checklist de creación documental que obligue a definir la nomenclatura antes de elaborar el documento.","metodo_analisis":"Ishikawa","plan_accion":"1. Revisar y asignar nomenclatura correcta a los documentos afectados (procedimiento de riesgos y registros derivados). 2. Crear un checklist de control para la creación de nuevos documentos que incluya: código, versión, responsable, vigencia y ubicación en SharePoint. 3. Actualizar la lista maestra de documentos (BPM-FO-12) con todos los documentos creados durante la reingeniería. 4. Capacitar a los responsables de proceso en el procedimiento de control documental. Responsable: Mizraim Alcázar. Fecha compromiso: 31/03/2026.","responsable_accion":"Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"Documentos renombrados conforme a nomenclatura SGI. Lista maestra actualizada. Checklist de creación documental implementado.","fecha_cierre":"2026-03-31","evidencia_cierre":"Lista maestra BPM-FO-12 actualizada; documentos renombrados conforme a nomenclatura; checklist de creación documental implementado","observaciones":"","ish_metodo":"Sin checklist de creación documental que obligue a definir código, versión, nomenclatura y ubicación en SharePoint antes de elaborar el documento","ish_proceso":"Proceso de creación documental reactivo durante la reingeniería: primero se creó el documento, después se intentó integrarlo al sistema de control documental","ish_norma":"ISO 9001/20000-1/27001 Cl. 7.5 — Documentos nuevos (ej. procedimiento de riesgos) sin código, versión ni nomenclatura conforme a SGI-07-PR-03","ish_personas":"Responsables de proceso no consultaron el procedimiento de control documental SGI-07-PR-03 al crear nuevos registros durante la reingeniería del SGI","ish_origen":"Creación acelerada de documentos (procedimiento de riesgos, formatos de auditoría) durante la reingeniería sin validación previa del estándar de nomenclatura","ish_accion":"Implementar checklist obligatorio de creación documental. Actualizar lista maestra BPM-FO-12. Capacitar responsables de proceso en SGI-07-PR-03"},{"id":3,"codigo":"INT-2025-001","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 9001","clausula":"6.1 Acciones para abordar riesgos y oportunidades","requisito":"6.1 Acciones para abordar riesgos y oportunidades","clasificacion":"NC Menor","descripcion":"¿La organización considera los riesgos y oportunidades para que el Sistema de Gestión pueda alcanzar sus requisitos previstos, aumentar efectos deseables, prevenir o reducir efectos no deseados y alcanzar la mejora? — Hallazgo: SGI-06-AX-05 Valoración de Riesgos del SGI","estado":"Cerrado","causa_raiz":"Causa raíz (5 porqués): 1. ¿Por qué no se abordan los riesgos del SGC? Porque la valoración de riesgos se realizó enfocada en el SGSI. 2. ¿Por qué solo en SGSI? Porque los procesos del SGC no tienen propietarios de riesgo designados. 3. ¿Por qué no tienen propietarios? Porque la asignación de roles de riesgo se limitó al SOC. 4. ¿Por qué se limitó al SOC? Porque el alcance del SGC es más amplio y el recurso no fue suficiente. Causa raíz: la gestión de riesgos no se implementó de forma integral para el SGC.","metodo_analisis":"Ishikawa","plan_accion":"1. Ampliar la matriz de riesgos para incluir los procesos del SGC (Q2C, ventas, pre-ventas, PMO). 2. Asignar propietarios de riesgo en cada área del alcance del SGC. 3. Realizar valoración de riesgos Q2C en el primer trimestre de 2026. Responsable: Adriana Reyes / Mizraim Alcázar. Fecha: 31/03/2026.","responsable_accion":"Adriana Reyes / Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"Matriz de riesgos ampliada con procesos Q2C. Propietarios asignados y registrados en Portal SGI.","fecha_cierre":"2026-03-31","evidencia_cierre":"Matriz de riesgos Q2C actualizada en Portal SGI; propietarios de riesgo asignados por área del SGC","observaciones":"Área: BPM","ish_metodo":"El método de valoración de riesgos se aplicó únicamente al SGSI (SOC/NOC) sin extenderse a los procesos del SGC y el ciclo Q2C","ish_proceso":"Los procesos del SGC (Quote-to-Cash: ventas, pre-ventas, PMO, Ingeniería) no fueron incluidos en el ciclo de identificación y valoración de riesgos","ish_norma":"ISO 9001 Cl. 6.1 — Gestión de riesgos del SGC no implementada de forma integral; el alcance Q2C no cuenta con propietarios de riesgo designados por proceso","ish_personas":"Recurso insuficiente para extender la valoración de riesgos a todas las áreas del SGC; los propietarios de riesgo solo estaban asignados en el SOC","ish_origen":"Enfoque histórico de la gestión de riesgos centrado en el SGSI (SOC); el SGC con alcance Q2C no estaba integrado al ciclo formal de valoración de riesgos","ish_accion":"Ampliar matriz de riesgos a los procesos Q2C. Asignar propietarios de riesgo por área. Realizar valoración completa del SGC en Q1 2026"},{"id":4,"codigo":"INT-2025-002","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"6.1","requisito":"6.1","clasificacion":"NC Menor","descripcion":"¿Se planifican acciones para abordar riesgos y oportunidades que impacten la continuidad y calidad del SOC/NOC? — Hallazgo: Dada los acuerdos contractuales, no es posible realizar pruebas de continuidad","estado":"Cerrado","causa_raiz":"Causa raíz (5 porqués): La planificación de riesgos del SOC/NOC no considera escenarios de continuidad porque el BIA no está formalmente documentado. El servicio de monitoreo opera con resiliencia técnica implícita (redundancia de sistemas) pero sin el respaldo documental requerido por la norma. Causa raíz: ausencia de un documento formal de análisis de impacto al negocio (BIA) para el servicio SOC.","metodo_analisis":"Ishikawa","plan_accion":"1. Elaborar el BIA del servicio SOC/NOC identificando RPO, RTO y dependencias críticas. 2. Documentar las acciones de continuidad existentes como plan formal. 3. Programar prueba tabletop de continuidad. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"BIA elaborado y aprobado por el Director de Operaciones. Plan de continuidad documentado.","fecha_cierre":"2026-03-31","evidencia_cierre":"BIA aprobado por Director de Operaciones; Plan de continuidad del SOC documentado con RTO/RPO","observaciones":"Área: SOC / NOC","ish_metodo":"Sin Análisis de Impacto al Negocio (BIA) formal que defina RPO, RTO y dependencias críticas del servicio SOC/NOC para planificar la continuidad","ish_proceso":"El proceso de gestión de continuidad del SOC no contempla el ciclo completo requerido: BIA → estrategia de continuidad → plan → prueba → lecciones aprendidas","ish_norma":"ISO 20000-1 Cl. 6.1 — Planificación de continuidad del SOC sin respaldo documental normativo; acuerdos contractuales limitan la ejecución de pruebas reales","ish_personas":"Sin responsable designado del plan de continuidad del servicio SOC; la resiliencia técnica es gestionada por el equipo de TI sin propietario formal del proceso en el SGS","ish_origen":"La resiliencia técnica del SOC (redundancia de sistemas, runbooks operativos) cubre la continuidad operativa pero no fue formalizada como plan de continuidad del SGS","ish_accion":"Elaborar BIA del servicio SOC/NOC con RPO/RTO. Documentar estrategia de continuidad. Programar ejercicio tabletop anual con registro de lecciones aprendidas"},{"id":5,"codigo":"INT-2025-003","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"6.2","requisito":"6.2","clasificacion":"NC Menor","descripcion":"¿Se establecen objetivos del SGI medibles para servicios SOC/NOC (SLA, MTTD/MTTR, etc.)? — Hallazgo: Los objetivos definidos, no cuentan con elementos para determinar su cumplimiento, indicadores, etc.","estado":"Cerrado","causa_raiz":"Causa raíz: Los objetivos del SOC/NOC están definidos a nivel corporativo (SLA contractuales) pero no se han traducido a indicadores internos medibles del SGS con frecuencia y responsable de medición explícitos.","metodo_analisis":"Ishikawa","plan_accion":"1. Definir indicadores SMART para el SOC: MTTD, MTTR, disponibilidad del servicio, tickets cerrados en tiempo. 2. Establecer frecuencia de medición mensual y responsable. 3. Integrar al módulo de Objetivos del Portal SGI. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"Indicadores definidos con ficha de medición. Integrados al Portal SGI en módulo Objetivos.","fecha_cierre":"2026-03-31","evidencia_cierre":"Fichas de indicadores SMART documentadas e integradas al Portal SGI módulo Objetivos","observaciones":"Área: SOC / NOC","ish_metodo":"Los objetivos del SOC/NOC se definieron como declaraciones cualitativas sin ficha de indicador: sin meta cuantitativa, sin frecuencia ni responsable de medición","ish_proceso":"El proceso de definición de objetivos del SGS no incluyó la etapa de operacionalización con indicadores SMART (específicos, medibles, alcanzables, relevantes y temporales)","ish_norma":"ISO 20000-1 Cl. 6.2 — Objetivos del SGS del SOC sin elementos medibles: sin indicador (MTTD, MTTR, disponibilidad), sin meta cuantitativa ni criterio de cumplimiento","ish_personas":"Sin responsable de medición asignado a cada objetivo del SOC; el seguimiento dependía de los SLAs contractuales con clientes, no de los objetivos internos del SGS","ish_origen":"Objetivos definidos tomando como referencia los compromisos contractuales con clientes, no los requisitos de desempeño interno del Sistema de Gestión del Servicio","ish_accion":"Definir indicadores SMART: MTTD, MTTR, disponibilidad, % tickets en tiempo. Asignar responsable de medición. Integrar al Portal SGI módulo Objetivos"},{"id":6,"codigo":"INT-2025-004","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"6.2.1","requisito":"6.2.1","clasificacion":"NC Menor","descripcion":"¿Los objetivos del SGI del SOC/NOC están definidos con criterios, plazos, responsables y métricas? — Hallazgo: Los objetivos definidos, no cuentan con elementos para determinar su cumplimiento, indicadores, etc.","estado":"Cerrado","causa_raiz":"Causa raíz: Los objetivos del SOC/NOC carecen de criterios de éxito documentados (valor meta, baseline, responsable de medición) porque se definieron como declaraciones cualitativas sin ficha de indicador asociada.","metodo_analisis":"Ishikawa","plan_accion":"1. Completar la ficha de cada objetivo con: meta cuantitativa, baseline, responsable, frecuencia y medio de verificación. 2. Vincular al registro BPM-FO-17. 3. Validar con Antonio Lazcano y José Luis Rodríguez. Responsable: Mizraim Alcázar. Fecha: 31/03/2026.","responsable_accion":"Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"Fichas de objetivos completadas y registradas en BPM-FO-17 y Portal SGI.","fecha_cierre":"2026-03-31","evidencia_cierre":"BPM-FO-17 con fichas de objetivos completadas; validación de José Luis Rodríguez y Antonio Lazcano","observaciones":"Área: SOC / NOC","ish_metodo":"Objetivos del SOC/NOC carecen de criterios de éxito documentados: sin valor meta, sin baseline, sin responsable de medición ni ficha de indicador asociada (BPM-FO-17)","ish_proceso":"El proceso de planificación del SGS no culminó con la formalización de las fichas de objetivos por indicador; los objetivos quedaron como declaraciones sin cuantificar","ish_norma":"ISO 20000-1 Cl. 6.2.1 — Objetivos sin: a) qué se medirá, b) criterios y métodos de evaluación, c) quién mide y cuándo, d) cómo se analizan y comunican los resultados","ish_personas":"Mizraim Alcázar y Antonio Lazcano no completaron el ciclo de documentación de objetivos hasta el nivel de ficha de indicador con todos sus atributos requeridos","ish_origen":"La reingeniería del SGI priorizó la definición de los objetivos como declaraciones; la formalización con fichas de indicador quedó pendiente al finalizar la fase inicial","ish_accion":"Completar ficha de cada objetivo con: meta cuantitativa, baseline, responsable, frecuencia y medio de verificación. Registrar en BPM-FO-17 y Portal SGI"},{"id":7,"codigo":"INT-2025-005","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"6.2.2","requisito":"6.2.2","clasificacion":"NC Menor","descripcion":"¿Existe un plan documentado para alcanzar los objetivos del SGI del SOC/NOC y se revisa su progreso? — Hallazgo: No se cuenta con elementos que demuestren que acciones se proponen para lograr los objetivos","estado":"Cerrado","causa_raiz":"Causa raíz: No existe un plan de acción documentado por objetivo con hitos y fechas. Las acciones se ejecutan operativamente pero sin trazabilidad documental hacia el objetivo que respaldan.","metodo_analisis":"Ishikawa","plan_accion":"1. Crear plan de acción por objetivo con: acción, responsable, fecha, recurso y evidencia esperada. 2. Hacer seguimiento semestral (S1/S2). 3. Registrar en Portal SGI módulo Objetivos. Responsable: Mizraim Alcázar / Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Mizraim Alcázar / Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"Planes S1 y S2 documentados en Portal SGI para los 8 objetivos del SGI.","fecha_cierre":"2026-03-31","evidencia_cierre":"Planes S1 y S2 documentados en Portal SGI para los 8 objetivos del SGI","observaciones":"Área: SOC / NOC","ish_metodo":"Sin plan de acción documentado por objetivo que vincule acciones, hitos, fechas y evidencias al objetivo estratégico que soportan; gestión sin trazabilidad","ish_proceso":"Las acciones de mejora en el SOC se ejecutan operativamente sin pasar por un proceso formal de planificación documentada con seguimiento periódico y cierre","ish_norma":"ISO 20000-1 Cl. 6.2.2 — Sin plan documentado para alcanzar los objetivos del SGS que incluya: acciones, plazos, responsables, recursos y métricas de seguimiento","ish_personas":"Sin responsable consolidado del plan de acción de los objetivos del SOC; la gestión estaba fragmentada entre diferentes responsables sin coordinación formal","ish_origen":"Operación reactiva del SOC centrada en atención de incidentes y cumplimiento de SLAs sin espacio formal para planificar y documentar el logro de los objetivos del SGS","ish_accion":"Crear plan de acción por objetivo con: acción, responsable, fecha compromiso, recurso y evidencia esperada. Seguimiento semestral (S1/S2) registrado en Portal SGI"},{"id":8,"codigo":"INT-2025-006","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"8.7.2","requisito":"8.7.2","clasificacion":"NC Menor","descripcion":"¿La gestión de continuidad de servicios SOC/NOC contempla BIA, estrategias, planes, pruebas y lecciones aprendidas? — Hallazgo: Dada los acuerdos contractuales, no es posible realizar pruebas de continuidad","estado":"Cerrado","causa_raiz":"Causa raíz: El plan de continuidad del SOC existe de forma técnica (runbooks, configuraciones de respaldo) pero no cumple los elementos documentales requeridos por ISO 20000-1 Cl. 8.7: BIA formal, estrategia documentada, plan probado y lecciones aprendidas registradas.","metodo_analisis":"Ishikawa","plan_accion":"1. Formalizar BIA con RTO/RPO por servicio. 2. Documentar estrategia de continuidad. 3. Realizar ejercicio tabletop y registrar lecciones aprendidas. 4. Programar prueba anual. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"Plan de continuidad formalizado con todos los elementos de la cláusula 8.7.","fecha_cierre":"2026-03-31","evidencia_cierre":"Plan de continuidad del SOC formalizado con todos los elementos de la cláusula 8.7 de ISO 20000-1","observaciones":"Área: SOC / NOC","ish_metodo":"El plan de continuidad del SOC existe técnicamente (runbooks, backups) pero no cumple el ciclo normativo completo: BIA → estrategia → plan → prueba → lecciones aprendidas","ish_proceso":"El proceso de gestión de continuidad del SOC no está formalizado con todos los elementos de ISO 20000-1 Cl. 8.7: BIA formal, estrategia documentada y pruebas periódicas","ish_norma":"ISO 20000-1 Cl. 8.7.2 — Continuidad de servicios SOC sin: BIA formal aprobado, estrategia documentada, plan probado ni lecciones aprendidas registradas","ish_personas":"Sin responsable formal del plan de continuidad del SOC como proceso del SGS; la resiliencia técnica gestionada por TI no tiene propietario de proceso en el sistema de gestión","ish_origen":"La resiliencia técnica del SOC (redundancia, runbooks) cubre la operación pero no fue traducida a la documentación formal requerida por el SGS para la continuidad del servicio","ish_accion":"Formalizar BIA con RTO/RPO por servicio SOC. Documentar estrategia de continuidad. Ejercicio tabletop con registro de lecciones aprendidas. Prueba anual programada"},{"id":9,"codigo":"INT-2025-007","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 27001","clausula":"6.1.1","requisito":"6.1.1","clasificacion":"NC Menor","descripcion":"¿Se planifican acciones para abordar riesgos y oportunidades del ISGI del SOC/NOC? — Hallazgo: Se cuenta con una matriz de identificación de riesgos, sin embargo, no se identifican oportunidades, ni se logra visualizar, como es que se mide el impacto de los mismo, ni como se determinan las acciones para clasificar el riesgo, ni el riesgo residual.","estado":"Cerrado","causa_raiz":"Causa raíz: La matriz de riesgos del SGSI contiene los riesgos pero los planes de tratamiento no están formalizados como documentos controlados con evidencia de implementación. El seguimiento es informal.","metodo_analisis":"Ishikawa","plan_accion":"1. Formalizar el registro de tratamiento de riesgos con evidencia por control implementado. 2. Vincular cada riesgo al control SOA correspondiente en el Portal SGI. 3. Revisar trimestralmente. Responsable: Antonio Lazcano / Mizraim Alcázar. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano / Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"28 riesgos con control SOA vinculado en Portal SGI. Evidencia de implementación registrada.","fecha_cierre":"2026-03-31","evidencia_cierre":"Portal SGI — 28 riesgos con control SOA vinculado y evidencia de implementación registrada","observaciones":"Área: SOC / NOC","ish_metodo":"Sin método documentado de evaluación de riesgos que establezca: criterios CIA de impacto, escala de probabilidad, cálculo de riesgo residual y umbral de aceptación","ish_proceso":"La evaluación de riesgos del SGSI se realizó sin aplicar el ciclo completo: identificación → análisis → evaluación → tratamiento → seguimiento documentado con evidencia","ish_norma":"ISO 27001 Cl. 6.1.1 — Matriz de riesgos sin: oportunidades identificadas, visualización del impacto CIA, criterios de clasificación ni cálculo del riesgo residual","ish_personas":"El equipo del SOC realizó la valoración de riesgos sin contar con formación completa en la metodología de evaluación de riesgos conforme a ISO 27001:2022","ish_origen":"Enfoque técnico del SOC centrado en la detección de amenazas sin integración formal con el proceso documental de gestión de riesgos del SGSI; los planes de tratamiento no se formalizaron","ish_accion":"Formalizar registro de tratamiento de riesgos con evidencia por control implementado. Vincular cada riesgo al control SOA en el Portal SGI. Revisión trimestral"},{"id":10,"codigo":"INT-2025-008","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 27001","clausula":"6.1.2","requisito":"6.1.2","clasificacion":"NC Menor","descripcion":"¿Se realiza evaluación de riesgos de seguridad de la información con criterios definidos y periodicidad adecuada? — Hallazgo: Se cuenta con una matriz de identificación de riesgos, sin embargo, no se identifican oportunidades, ni se logra visualizar, como es que se mide el impacto de los mismo, ni como se determinan las acciones para clasificar el riesgo, ni el riesgo residual.","estado":"Cerrado","causa_raiz":"Causa raíz: La evaluación de riesgos se realizó pero sin criterios de aceptación documentados ni periodicidad formal establecida. No existe un calendario de reevaluación.","metodo_analisis":"Ishikawa","plan_accion":"1. Documentar criterios de aceptación de riesgo (umbral, metodología CIA). 2. Establecer calendario anual de reevaluación. 3. Registrar próxima reevaluación en el Portal SGI módulo Calendario. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"Criterios de aceptación documentados. Próxima reevaluación programada para Q3 2026.","fecha_cierre":"2026-03-31","evidencia_cierre":"Criterios de aceptación de riesgo documentados; próxima reevaluación programada en el Portal SGI para Q3 2026","observaciones":"Área: SOC / NOC","ish_metodo":"Sin criterios de aceptación de riesgo documentados (umbral de tolerancia, metodología CIA) ni periodicidad formal de reevaluación anual establecida","ish_proceso":"La evaluación de riesgos se realizó como evento único para la recertificación sin ciclo de reevaluación periódica ni calendario formal de revisión","ish_norma":"ISO 27001 Cl. 6.1.2 — Evaluación de riesgos sin criterios de aceptación documentados, sin periodicidad formal establecida ni trazabilidad de versiones del análisis","ish_personas":"Sin propietario de riesgo formal asignado por proceso dentro del SOC; la responsabilidad de la evaluación de riesgos no estaba asignada explícitamente","ish_origen":"La evaluación de riesgos se enfocó en el levantamiento inicial para la recertificación Sep 2025 sin planificar su actualización periódica como ciclo sostenido del SGSI","ish_accion":"Documentar criterios de aceptación de riesgo (umbral, metodología CIA). Establecer calendario anual de reevaluación. Registrar en Portal SGI módulo Calendario"},{"id":11,"codigo":"INT-2025-009","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 27001","clausula":"6.1.3","requisito":"6.1.3","clasificacion":"NC Menor","descripcion":"¿Se ejecuta el tratamiento de riesgos y se mantiene la Declaración de Aplicabilidad vigente? — Hallazgo: Se cuenta con una matriz de identificación de riesgos, sin embargo, no se identifican oportunidades, ni se logra visualizar, como es que se mide el impacto de los mismo, ni como se determinan las acciones para clasificar el riesgo, ni el riesgo residual.","estado":"Cerrado","causa_raiz":"Causa raíz: El SOA existe pero no se ha actualizado formalmente tras la transición a ISO 27001:2022. Los controles nuevos de la versión 2022 no tienen justificación de aplicabilidad documentada para los controles que no existían en 2013.","metodo_analisis":"Ishikawa","plan_accion":"1. Actualizar el SOA con la nueva estructura de controles 2022 (93 controles). 2. Documentar justificación de aplicabilidad para controles nuevos. 3. Validar con el auditor interno antes de julio 2026. Responsable: Antonio Lazcano / Mizraim Alcázar. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano / Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"SOA actualizado a versión 2022 con 93 controles y justificaciones registradas en Portal SGI.","fecha_cierre":"2026-03-31","evidencia_cierre":"SOA actualizado a ISO 27001:2022 con 93 controles y justificaciones de aplicabilidad registradas en Portal SGI","observaciones":"Área: SOC / NOC","ish_metodo":"Sin método de actualización del SOA sincronizado con la transición de versión normativa; controles nuevos de la versión 2022 sin justificación de aplicabilidad formal","ish_proceso":"El proceso de transición ISO 27001:2013→2022 no incluyó la actualización formal del SOA con la nueva estructura de 93 controles del Anexo A versión 2022","ish_norma":"ISO 27001 Cl. 6.1.3 — SOA sin actualizar a versión 2022: controles nuevos sin justificación documentada de aplicabilidad; tratamiento de riesgos sin riesgo residual explícito","ish_personas":"Antonio Lazcano y Mizraim Alcázar identificaron la brecha del SOA pero la actualización formal quedó pendiente por priorización del plan de trabajo de recertificación","ish_origen":"Transición normativa ISO 27001:2013→2022 ejecutada durante la recertificación Sep 2025 sin tiempo para actualizar simultáneamente todos los documentos del SGSI","ish_accion":"Actualizar SOA con 93 controles ISO 27001:2022. Documentar justificación de aplicabilidad para controles nuevos. Validar con auditor interno antes de julio 2026"},{"id":12,"codigo":"INT-2025-010","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 27001","clausula":"6.2","requisito":"6.2","clasificacion":"NC Menor","descripcion":"¿Se establecen objetivos de seguridad medibles, con planes para lograrlos en el SOC/NOC? — Hallazgo: Se cuenta con una matriz de identificación de riesgos, sin embargo, no se identifican oportunidades, ni se logra visualizar, como es que se mide el impacto de los mismo, ni como se determinan las acciones para clasificar el riesgo, ni el riesgo residual.","estado":"Cerrado","causa_raiz":"Causa raíz: Los objetivos de seguridad de la información no tienen indicadores cuantitativos ni responsable de medición. Se definieron como compromisos generales sin métricas de seguimiento.","metodo_analisis":"Ishikawa","plan_accion":"1. Definir KPIs de seguridad: incidentes por mes, tiempo de respuesta, % controles implementados. 2. Asignar responsable de medición en el SOC. 3. Integrar al Portal SGI módulo Objetivos. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"KPIs de seguridad definidos e integrados al Portal SGI.","fecha_cierre":"2026-03-31","evidencia_cierre":"KPIs de seguridad definidos e integrados al Portal SGI módulo Objetivos; asignado responsable de medición en el SOC","observaciones":"Área: SOC / NOC","ish_metodo":"Los objetivos de seguridad se definieron como compromisos generales sin KPIs cuantitativos ni metodología de medición de la eficacia de los controles","ish_proceso":"El proceso de definición de objetivos del SGSI no incluyó la etapa de asignación de indicadores con metas, responsable de medición y frecuencia de seguimiento","ish_norma":"ISO 27001 Cl. 6.2 — Objetivos de seguridad de la información sin indicadores cuantitativos, sin responsable de medición ni plan documentado para lograrlos","ish_personas":"Sin responsable de medición de objetivos de seguridad en el SOC; Antonio Lazcano gestiona la operación pero sin proceso formal de seguimiento de indicadores del SGSI","ish_origen":"Objetivos de seguridad heredados de los compromisos de recertificación Sep 2025 sin reformulación como objetivos del SGSI con KPIs medibles y seguimiento formal","ish_accion":"Definir KPIs de seguridad: incidentes/mes, tiempo de respuesta, % controles implementados. Asignar responsable en SOC. Integrar al Portal SGI módulo Objetivos"},{"id":13,"codigo":"INT-2025-011","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 27001","clausula":"8.3","requisito":"8.3","clasificacion":"NC Menor","descripcion":"¿Se implementan los planes de tratamiento de riesgos y se conservan evidencias de su ejecución? — Hallazgo: Se cuenta con una matriz de identificación de riesgos, sin embargo, no se identifican oportunidades, ni se logra visualizar, como es que se mide el impacto de los mismo, ni como se determinan las acciones para clasificar el riesgo, ni el riesgo residual.","estado":"Cerrado","causa_raiz":"Causa raíz: Los planes de tratamiento existen en la matriz de riesgos pero no hay registros de evidencia de implementación de controles ni seguimiento documentado al estado de cada control.","metodo_analisis":"Ishikawa","plan_accion":"1. Crear registro de implementación de controles con: control, responsable, fecha implementación, evidencia. 2. Vincular al SOA en Portal SGI. 3. Revisar trimestralmente en comité de seguridad. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"Registro de implementación creado y vinculado al SOA en Portal SGI.","fecha_cierre":"2026-03-31","evidencia_cierre":"Registro de implementación de controles creado y vinculado al SOA en Portal SGI","observaciones":"Área: SOC / NOC","ish_metodo":"Sin registro formal de implementación de controles con: control aplicado, responsable, fecha de implementación y evidencia de efectividad del control","ish_proceso":"El proceso de implementación de controles de riesgo del SGSI no incluye la captura de evidencia ni el seguimiento documentado al estado de cada control","ish_norma":"ISO 27001 Cl. 8.3 — Planes de tratamiento de riesgos sin evidencia de implementación por control ni seguimiento documentado al estado de implementación","ish_personas":"El equipo del SOC implementa controles técnicos de seguridad pero sin documentar la evidencia de implementación requerida por el SGSI para la trazabilidad","ish_origen":"Enfoque técnico del SOC centrado en la operación de controles sin integración con el proceso documental del SGSI; los planes existen en la matriz pero sin evidencia de ejecución","ish_accion":"Crear registro de implementación de controles vinculado al SOA en Portal SGI. Incluir: control, responsable, fecha, evidencia. Revisión trimestral en comité de seguridad"},{"id":14,"codigo":"INT-2025-012","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 27001","clausula":"A.5.24","requisito":"A.5.24","clasificacion":"NC Menor","descripcion":"¿Existen objetivos de seguridad medibles para el SOC/NOC y se reporta su estado periódicamente? — Hallazgo: Los objetivos definidos, no cuentan con elementos para determinar su cumplimiento, indicadores, etc.","estado":"Cerrado","causa_raiz":"Causa raíz: Los objetivos de seguridad del SOC no se reportan con periodicidad establecida a la dirección. No existe un mecanismo de reporte formal de KPIs de seguridad.","metodo_analisis":"Ishikawa","plan_accion":"1. Establecer reporte mensual de KPIs de seguridad del SOC. 2. Incluir en agenda de revisión por la dirección. 3. Documentar en Portal SGI módulo Revisión por la Dirección. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"Reporte mensual de KPIs implementado. Incluido en agenda de revisión por la dirección.","fecha_cierre":"2026-03-31","evidencia_cierre":"Reporte mensual de KPIs de seguridad implementado; incluido en agenda formal de revisión por la dirección","observaciones":"Área: SOC / NOC","ish_metodo":"Sin mecanismo de reporte formal de KPIs de seguridad del SOC a la Alta Dirección con periodicidad establecida y formato estandarizado","ish_proceso":"El proceso de seguimiento y reporte de objetivos de seguridad del SOC no está integrado al ciclo formal de revisión por la dirección del SGI","ish_norma":"ISO 27001 A.5.24 — Objetivos de seguridad del SOC sin reporte periódico formal a la Alta Dirección; sin mecanismo de escalamiento de KPIs de seguridad","ish_personas":"Antonio Lazcano gestiona la operación de seguridad del SOC pero sin canal formal de reporte de KPIs a la Alta Dirección (José Luis Rodríguez / Francisco Camargo)","ish_origen":"El reporte de seguridad del SOC se realiza en revisiones operativas con clientes (SLAs) pero no como reporte formal del SGSI dirigido a la Alta Dirección","ish_accion":"Establecer reporte mensual de KPIs de seguridad del SOC. Incluir en agenda formal de revisión por la dirección. Documentar en Portal SGI módulo Revisión por la Dirección"},{"id":15,"codigo":"INT-2025-013","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"8.1","requisito":"8.1","clasificacion":"Observación","descripcion":"¿Se planifican, implementan y controlan las operaciones del SGI del SOC/NOC, incluyendo cambios planificados y tercerización? — Hallazgo: Se requiere revisar la clasificación de los cambios, y los niveles de aprobación y documentación.","estado":"Cerrado","causa_raiz":"Causa raíz: La planificación operativa del SGS incluye las operaciones del SOC pero la documentación de control de cambios operativos y tercerización no es consistente con lo requerido por la cláusula 8.1.","metodo_analisis":"Ishikawa","plan_accion":"1. Documentar el proceso de planificación y control operacional del SOC. 2. Incluir control de terceros (Cisco, subcontratistas). 3. Revisar con Antonio Lazcano y actualizar procedimientos. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"Procedimiento de planificación operacional documentado y aprobado.","fecha_cierre":"2026-03-31","evidencia_cierre":"Procedimiento de planificación y control operacional del SOC documentado y aprobado, incluyendo gestión de terceros","observaciones":"Área: SOC / NOC","ish_metodo":"Sin procedimiento documentado de planificación y control operacional del SOC que integre: control de cambios planificados, gestión de terceros y revisión de resultados","ish_proceso":"El proceso de control de cambios del SOC existe operativamente pero no está documentado ni alineado con los requisitos de la cláusula 8.1 del SGS","ish_norma":"ISO 20000-1 Cl. 8.1 — Planificación operacional incompleta: sin documentación formal de control de cambios planificados ni gestión de la tercerización del servicio","ish_personas":"Antonio Lazcano gestiona los cambios operativos del SOC de forma efectiva pero sin el respaldo documental del proceso requerido por la cláusula 8.1 del SGS","ish_origen":"La tercerización del servicio SOC (Cisco y subcontratistas) no ha sido documentada como proceso controlado dentro del SGS; los controles son informales","ish_accion":"Documentar proceso de planificación y control operacional del SOC incluyendo control de terceros (Cisco, subcontratistas). Revisar clasificación de cambios con Antonio Lazcano"},{"id":16,"codigo":"INT-2025-014","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"4.4","requisito":"4.4","clasificacion":"Oportunidad de mejora","descripcion":"¿Se han establecido, implementado y mantenido todos los procesos necesarios del SGI para SOC/NOC?","estado":"Cerrado","causa_raiz":"Causa raíz: El SGI tiene los procesos definidos pero algunos no están completamente implementados ni mantenidos conforme al alcance. La transición de versión normativa dejó brechas en la operación de algunos procesos.","metodo_analisis":"Ishikawa","plan_accion":"1. Mapear todos los procesos declarados en el alcance del SGI. 2. Identificar brechas de implementación. 3. Elaborar plan de cierre de brechas con prioridad por riesgo. Responsable: Mizraim Alcázar. Fecha: 31/03/2026.","responsable_accion":"Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"Mapa de procesos completo. Brechas identificadas y cerradas según plan priorizado.","fecha_cierre":"2026-03-31","evidencia_cierre":"Mapa de procesos completo del SGI; brechas de implementación identificadas y cerradas conforme al plan priorizado","observaciones":"Área: SOC / NOC","ish_metodo":"Sin mapa completo de procesos del SGI que permita verificar el estado de implementación de cada proceso declarado en el alcance y detectar brechas","ish_proceso":"El proceso de transición normativa no incluyó un cierre formal de brechas de implementación proceso por proceso ni verificación de conformidad post-transición","ish_norma":"ISO 20000-1 Cl. 4.4 — Procesos del SGI definidos en el alcance pero no todos completamente implementados ni mantenidos; transición 2013→2022 generó brechas operativas","ish_personas":"Mizraim Alcázar identifica las brechas del SGI pero el cierre requiere participación de múltiples responsables de proceso con otras prioridades operativas","ish_origen":"La transición normativa ISO 27001:2013→2022 y la reingeniería del SGI 2025 generaron brechas en la implementación de algunos procesos no cerradas formalmente","ish_accion":"Mapear todos los procesos del SGI vs. alcance declarado. Identificar brechas de implementación. Elaborar plan de cierre priorizado por riesgo. Responsable: Mizraim Alcázar"},{"id":17,"codigo":"INT-2025-015","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"7.5.2","requisito":"7.5.2","clasificacion":"Oportunidad de mejora","descripcion":"¿La información documentada del SGI del SOC/NOC se crea/actualiza con identificación, formato y revisión adecuados? — Hallazgo: Si bien se cuentan con elementos necesarios para la gestión documental, se requiere revisar la sostenibilidad de los criterios para el mantenimiento del inventario de información","estado":"Cerrado","causa_raiz":"Causa raíz: Durante la reingeniería documental, algunos documentos nuevos se crearon sin seguir el estándar de formato y revisión del procedimiento de control documental (identificación, estado de revisión, aprobación).","metodo_analisis":"Ishikawa","plan_accion":"1. Revisar todos los documentos creados en 2025 y verificar cumplimiento de formato. 2. Actualizar los que no cumplan con identificación y estado de revisión. 3. Integrar a la lista maestra BPM-FO-12. Responsable: Mizraim Alcázar. Fecha: 31/03/2026.","responsable_accion":"Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"100% de documentos 2025 revisados y actualizados conforme al estándar.","fecha_cierre":"2026-03-31","evidencia_cierre":"100% de documentos creados en 2025 revisados y actualizados; lista maestra BPM-FO-12 actualizada con todos los documentos de la reingeniería","observaciones":"Área: SOC / NOC","ish_metodo":"Durante la reingeniería del SGI, los documentos nuevos se crearon sin aplicar el estándar de formato, identificación y estado de revisión del procedimiento documental","ish_proceso":"El proceso de creación y actualización documental no incluyó verificación de cumplimiento de los criterios de identificación, revisión y aprobación antes de publicar","ish_norma":"ISO 20000-1 Cl. 7.5.2 — Información documentada sin identificación adecuada, sin estado de revisión formal ni criterios de sostenibilidad del inventario documental","ish_personas":"Los responsables de proceso crearon documentos durante la reingeniería del SGI 2025 sin seguir el procedimiento de control documental SGI-07-PR-03","ish_origen":"La reingeniería del SGI 2025 generó múltiples documentos nuevos bajo presión de tiempo sin verificación formal de cumplimiento del estándar documental establecido","ish_accion":"Revisar todos los documentos 2025 y verificar cumplimiento de formato e identificación. Actualizar con estado de revisión. Integrar a lista maestra BPM-FO-12"},{"id":18,"codigo":"INT-2025-016","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"8.2.6","requisito":"8.2.6","clasificacion":"Oportunidad de mejora","descripcion":"¿Se gestiona la configuración del SOC/NOC (identificación, control de cambios, registros CMDB/CI)? — Hallazgo: Se requiere documentar dentro de la CMDB, umbrales de capacidad y disponibilidad","estado":"Cerrado","causa_raiz":"Causa raíz: La CMDB del SOC existe como configuración técnica en las herramientas de monitoreo pero no está documentada formalmente con los atributos requeridos (identificación, estado, relaciones, control de cambios).","metodo_analisis":"Ishikawa","plan_accion":"1. Formalizar la CMDB del SOC con inventario de CIs, atributos y relaciones. 2. Establecer proceso de actualización ante cambios. 3. Integrar con el proceso de gestión de cambios. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"CMDB formalizada con inventario de CIs y proceso de actualización documentado.","fecha_cierre":"2026-03-31","evidencia_cierre":"CMDB del SOC formalizada con inventario de CIs, atributos, umbrales y proceso de actualización documentado","observaciones":"Área: SOC / NOC","ish_metodo":"Sin procedimiento documentado de gestión de la CMDB con criterios de identificación de CIs, atributos obligatorios (umbrales de capacidad/disponibilidad) y control de cambios","ish_proceso":"El proceso de gestión de configuración del SOC existe técnicamente en las herramientas de monitoreo pero no está formalizado como proceso del SGS con sus elementos requeridos","ish_norma":"ISO 20000-1 Cl. 8.2.6 — CMDB del SOC sin atributos requeridos: identificación formal de CIs, estado, relaciones entre CIs, umbrales de capacidad y disponibilidad","ish_personas":"El equipo técnico del SOC mantiene la configuración en herramientas propietarias sin documentación del SGS; sin responsable formal asignado a la CMDB como proceso","ish_origen":"La CMDB del SOC existe como configuración técnica en herramientas de monitoreo Cisco pero no fue formalizada como documento controlado del SGS con sus atributos normados","ish_accion":"Formalizar CMDB del SOC con inventario de CIs, atributos y relaciones. Documentar umbrales de capacidad y disponibilidad. Integrar con el proceso de gestión de cambios"},{"id":19,"codigo":"INT-2025-017","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"8.5.1","requisito":"8.5.1","clasificacion":"Oportunidad de mejora","descripcion":"¿La gestión de cambios del SOC/NOC evalúa riesgos, impacto y autorización, con segregación y registro? — Hallazgo: Homologar criterios para la clasificación de los cambios","estado":"Cerrado","causa_raiz":"Causa raíz: La gestión de cambios del SOC se realiza operativamente pero no existe una política documentada de evaluación de riesgos e impacto previa a la autorización de cambios, ni segregación de funciones entre quien solicita y quien aprueba.","metodo_analisis":"Ishikawa","plan_accion":"1. Documentar política de gestión de cambios del SOC con: clasificación, evaluación de riesgo, aprobación y registro. 2. Establecer comité de cambios con roles definidos. 3. Alinear con proceso de cambios del SGI. Responsable: Antonio Lazcano / Mizraim Alcázar. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano / Mizraim Alcázar","fecha_compromiso":"2026-03-31","verificacion":"Política de gestión de cambios del SOC documentada y operativa.","fecha_cierre":"2026-03-31","evidencia_cierre":"Política de gestión de cambios del SOC documentada y operativa; comité de cambios con roles definidos establecido","observaciones":"Área: SOC / NOC","ish_metodo":"Sin política documentada de evaluación de riesgo e impacto previa a la autorización de cambios en el SOC; sin criterios homologados de clasificación de cambios","ish_proceso":"El proceso de gestión de cambios del SOC no incluye: evaluación de riesgo formal, clasificación del tipo de cambio, aprobación con segregación de funciones y registro","ish_norma":"ISO 20000-1 Cl. 8.5.1 — Cambios del SOC sin evaluación de riesgo previa ni segregación de funciones entre quien solicita, quien aprueba y quien implementa","ish_personas":"Sin comité de cambios formal con roles definidos en el SOC; la misma persona puede solicitar y aprobar cambios sin control de segregación de funciones","ish_origen":"El SOC gestiona cambios operativos frecuentes (configuraciones, actualizaciones) de forma ágil sin el proceso formal de evaluación de riesgo e impacto del SGS","ish_accion":"Documentar política de gestión de cambios del SOC: clasificación, evaluación de riesgo, aprobación y registro. Establecer comité de cambios con roles. Alinear con SGI"},{"id":20,"codigo":"INT-2025-018","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 20000-1","clausula":"9.1","requisito":"9.1","clasificacion":"Oportunidad de mejora","descripcion":"¿Se definen y aplican métricas y métodos para el monitoreo, medición, análisis y evaluación del SGI del SOC/NOC? — Hallazgo: Es necesario documentar objetivos bajo metodologías especificas de medición y seguimiento","estado":"Cerrado","causa_raiz":"Causa raíz: No están definidas las métricas de seguimiento del SGS del SOC con criterios de evaluación de eficacia. El monitoreo se realiza sobre SLAs contractuales pero no sobre indicadores de desempeño del sistema de gestión.","metodo_analisis":"Ishikawa","plan_accion":"1. Definir métricas del SGS: % conformidad de procesos, indicadores de incidentes, satisfacción del cliente. 2. Establecer frecuencia y responsable de medición. 3. Integrar al Portal SGI módulo Objetivos. Responsable: Antonio Lazcano. Fecha: 31/03/2026.","responsable_accion":"Antonio Lazcano","fecha_compromiso":"2026-03-31","verificacion":"Métricas definidas, medición implementada y registrada en Portal SGI.","fecha_cierre":"2026-03-31","evidencia_cierre":"Métricas del SGS del SOC definidas, medición implementada y registrada en Portal SGI módulo Objetivos","observaciones":"Área: SOC / NOC","ish_metodo":"Sin metodología documentada de monitoreo y medición del SGS del SOC: sin definición de qué se mide, con qué criterios de eficacia y con qué método de análisis","ish_proceso":"El proceso de monitoreo del SOC se centra en SLAs contractuales con clientes pero no incluye indicadores de desempeño del Sistema de Gestión del Servicio interno","ish_norma":"ISO 20000-1 Cl. 9.1 — Sin definición de métricas y métodos para el monitoreo, medición, análisis y evaluación del desempeño del SGS del SOC/NOC","ish_personas":"Antonio Lazcano y su equipo reportan SLAs a clientes pero no tienen un proceso formal de reporte de desempeño del SGS a la dirección de NTT DATA","ish_origen":"La medición del SOC está orientada a compromisos contractuales externos con clientes, no al desempeño interno del Sistema de Gestión del Servicio (SGS)","ish_accion":"Definir métricas del SGS: % conformidad de procesos, indicadores de incidentes, satisfacción del cliente. Frecuencia y responsable. Integrar al Portal SGI módulo Objetivos"},{"id":21,"codigo":"INT-2025-019","origen":"Auditoría Interna","fuente":"Auditoría Interna SGI — Sep 2025","fecha_deteccion":"2025-09-01","normas":"ISO 27001","clausula":"8.1","requisito":"8.1","clasificacion":"Oportunidad de mejora","descripcion":"¿Se planifican y controlan las operaciones del ISGI del SOC/NOC, incluidos cambios y procesos subcontratados? — Hallazgo: Homologar criterios para la clasificación de los cambios","estado":"Cerrado","causa_raiz":"Causa raíz: La planificación de operaciones del SGSI incluye los controles técnicos pero no contempla formalmente el control de cambios en el SGSI n
