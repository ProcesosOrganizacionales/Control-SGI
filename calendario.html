<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Calendario SGI · NTT DATA</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--navy:#0B1F3A;--blue:#0067B1;--teal:#00B8C8;--bg:#F4F6FA;--card:#FFF;--border:#E2E8F2;--text:#1A2B42;--muted:#7A8CA0;--green:#0A7A5A;--red:#B52020;--purple:#5A28A8;--interna-bg:#EBF4FD;--interna-mid:#0067B1;--externa-bg:#FDEAEA;--externa-mid:#B52020;--revision-bg:#E8F6F0;--revision-mid:#0A7A5A;--curso-bg:#F0EBFD;--curso-mid:#5A28A8}body{font-family:"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}.tl-wrap{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px;box-shadow:0 1px 6px rgba(11,31,58,.06)}.tl-hdr{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:#FAFBFD}.tl-hdr-tit{font-size:12px;font-weight:700;color:var(--text);letter-spacing:.2px}.tl-hdr-sub{font-size:11px;color:var(--muted);margin-left:auto;font-family:"DM Mono",monospace}.months{display:grid;grid-template-columns:repeat(12,1fr)}.mcol{border-right:1px solid var(--border);min-width:0}.mcol:last-child{border-right:none}.mhead{padding:6px 4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:#F8FAFC;white-space:nowrap}.mcol.hoy .mhead{background:#FFFBEA;color:#7A4F00;font-weight:800}.mcol.hoy{outline:2px solid #F0C040;outline-offset:-1px}.mbody{padding:8px 4px;min-height:64px;display:flex;flex-direction:column;gap:4px}.pill{border-radius:4px;padding:4px 5px;font-size:8.5px;font-weight:600;line-height:1.3;text-align:center}.pill.curso{background:var(--curso-bg);color:var(--curso-mid);border:1px solid #C4B4F5}.pill.interna{background:var(--interna-bg);color:var(--interna-mid);border:1px solid #9ECAED}.pill.externa{background:var(--externa-bg);color:var(--externa-mid);border:1px solid #F0AAAA}.pill.revision{background:var(--revision-bg);color:var(--revision-mid);border:1px solid #86CDB0}.pill.hoytag{background:#FFF3CD;color:#7A4F00;border:1px solid #F0C040;font-weight:800}.daysbadge{font-size:9px;font-weight:800;display:inline-block;padding:2px 5px;border-radius:3px;margin-top:2px;text-align:center;font-family:"DM Mono",monospace}.daysbadge.int{background:#D6ECFB;color:#004F90}.daysbadge.ext{background:#FCE0E0;color:#8B1515}.mempty{font-size:9px;color:#C0CAD6;text-align:center;margin-top:4px}.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}@media(max-width:800px){.cards{grid-template-columns:1fr}}.card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 6px rgba(11,31,58,.06);display:flex;flex-direction:column}.ctop{padding:18px 22px 16px;display:flex;gap:16px;align-items:flex-start;border-bottom:1px solid var(--border)}.ctop.interna{border-left:4px solid var(--interna-mid)}.ctop.externa{border-left:4px solid var(--externa-mid)}.cicon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}.cicon.interna{background:var(--interna-bg)}.cicon.externa{background:var(--externa-bg)}.cinfo{flex:1;min-width:0}.ctipo{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}.ctipo.interna{color:var(--interna-mid)}.ctipo.externa{color:var(--externa-mid)}.cfecha{font-size:24px;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.5px}.cmes{font-size:14px;font-weight:600;color:var(--muted);margin-top:2px}.ccount{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 16px;border-radius:10px;min-width:72px}.ccount.interna{background:var(--interna-bg)}.ccount.externa{background:var(--externa-bg)}.cnum{font-size:34px;font-weight:800;line-height:1;font-family:"DM Mono",monospace}.cnum.interna{color:var(--interna-mid)}.cnum.externa{color:var(--externa-mid)}.clbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}.cbot{padding:12px 22px;display:flex;flex-direction:column;gap:6px}.crow{display:flex;align-items:center;gap:8px;font-size:11px}.clbl2{color:var(--muted);min-width:90px;font-weight:500}.cval{color:var(--text);font-weight:600}.ley{display:flex;gap:10px;flex-wrap:wrap;padding:10px 0 0}.leyit{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}.leydot{width:10px;height:10px;border-radius:3px;flex-shrink:0}</style></head><body><div class="tl-wrap"><div class="tl-hdr"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7A8CA0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="tl-hdr-tit">Calendario SGI 2025 – 2026</span><span class="tl-hdr-sub" id="hoyLbl"></span></div><div class="months" id="months"></div></div><div class="cards" id="cards"></div><div class="ley"><div class="leyit"><div class="leydot" style="background:#F0EBFD;border:1px solid #C4B4F5"></div>Curso auditores internos</div><div class="leyit"><div class="leydot" style="background:#EBF4FD;border:1px solid #9ECAED"></div>Auditoría interna</div><div class="leyit"><div class="leydot" style="background:#FDEAEA;border:1px solid #F0AAAA"></div>Vigilancia externa · Compecer</div><div class="leyit"><div class="leydot" style="background:#E8F6F0;border:1px solid #86CDB0"></div>Revisión por la dirección</div><div class="leyit"><div class="leydot" style="background:#FFF3CD;border:1px solid #F0C040"></div>Mes actual</div></div><script>const EVS=[{"id":0,"nombre":"Curso auditores internos","fecha_inicio":"2025-11-01","fecha_fin":"2026-03-31","tipo":"curso","responsable":"Equipo SGI","critico":false,"organismo":"","alcance":"","subtipo":"Formación de auditores internos","duracion":"5 meses"},{"id":1,"nombre":"Auditoría Interna SGI","fecha_inicio":"2026-07-13","fecha_fin":"2026-07-24","tipo":"interna","responsable":"América Alcázar","critico":true,"organismo":"NTT DATA México","alcance":"ISO 9001 · ISO 27001 · ISO 20000-1","subtipo":"Interna · Equipo auditor NTT DATA","duracion":"8 días hábiles"},{"id":2,"nombre":"Vigilancia Compecer","fecha_inicio":"2026-08-17","fecha_fin":"2026-08-21","tipo":"externa","responsable":"COMPECER","critico":true,"organismo":"COMPECER","alcance":"ISO 9001 · ISO 27001 · ISO 20000-1","subtipo":"1ra vigilancia post-recertificación","duracion":"5 días hábiles"},{"id":3,"nombre":"Revisión por la Dirección","fecha_inicio":"2026-09-01","fecha_fin":"2026-09-30","tipo":"revision","responsable":"José Luis Rodríguez","critico":false,"organismo":"NTT DATA México","alcance":"ISO 9001 · ISO 27001 · ISO 20000-1","subtipo":"Revisión anual Cl. 9.3","duracion":"1 sesión"}];const MESES=[{y:2025,m:11,lbl:"Nov 25"},{y:2025,m:12,lbl:"Dic 25"},{y:2026,m:1,lbl:"Ene 26"},{y:2026,m:2,lbl:"Feb 26"},{y:2026,m:3,lbl:"Mar 26"},{y:2026,m:4,lbl:"Abr 26"},{y:2026,m:5,lbl:"May 26"},{y:2026,m:6,lbl:"Jun 26"},{y:2026,m:7,lbl:"Jul 26"},{y:2026,m:8,lbl:"Ago 26"},{y:2026,m:9,lbl:"Sep 26"},{y:2026,m:10,lbl:"Oct 26"}];const TIPOS={curso:{lbl:"Curso auditores",icono:"🎓",titulo:"CURSO DE AUDITORES"},interna:{lbl:"Aud. interna",icono:"📋",titulo:"AUDITORÍA INTERNA SGI"},externa:{lbl:"Vigilancia Compecer",icono:"🔍",titulo:"AUDITORÍA EXTERNA · VIGILANCIA"},revision:{lbl:"Rev. Dirección",icono:"📊",titulo:"REVISIÓN POR LA DIRECCIÓN"}};function dH(i){if(!i)return null;var p=i.split("-").map(Number);var t=new Date(p[0],p[1]-1,p[2]);var h=new Date();h.setHours(0,0,0,0);return Math.ceil((t-h)/86400000)}function rC(e){if(!e.fecha_inicio)return"";var pI=e.fecha_inicio.split("-").map(Number);if(!e.fecha_fin||e.fecha_fin===e.fecha_inicio)return""+pI[2];var pF=e.fecha_fin.split("-").map(Number);if(pI[0]===pF[0]&&pI[1]===pF[1])return pI[2]+" al "+pF[2];var ms=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];return pI[2]+" "+ms[pI[1]-1]+" – "+pF[2]+" "+ms[pF[1]-1]+" "+pF[0]}function mAL(i){if(!i)return"";var p=i.split("-").map(Number);var ms=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];return ms[p[1]-1]+" "+p[0]}function hM(my){var h=new Date();return h.getFullYear()===my.y&&(h.getMonth()+1)===my.m}function init(){var hoy=new Date().toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"});document.getElementById("hoyLbl").textContent="Hoy: "+hoy;var th="";MESES.forEach(function(m){var eH=hM(m);var ev=EVS.filter(function(e){if(!e.fecha_inicio)return false;var pI=e.fecha_inicio.split("-").map(Number);var pF=(e.fecha_fin||e.fecha_inicio).split("-").map(Number);var s=pI[0]*12+pI[1],en=pF[0]*12+pF[1],c=m.y*12+m.m;return c>=s&&c<=en});var eh="";ev.forEach(function(e){var t=TIPOS[e.tipo]||TIPOS.curso;eh+='<div class="pill '+e.tipo+'">'+t.lbl+'</div>'});var cM=ev.filter(function(e){if(!e.critico)return false;var pI=e.fecha_inicio.split("-").map(Number);return pI[0]===m.y&&pI[1]===m.m});cM.forEach(function(e){var d=dH(e.fecha_inicio);if(d===null||d<0)return;var c=e.tipo==="externa"?"ext":"int";eh+='<div style="text-align:center"><span class="daysbadge '+c+'">'+d+'d</span></div>'});if(eH)eh+='<div class="pill hoytag">Hoy</div>';if(!eh)eh='<div class="mempty">—</div>';th+='<div class="mcol'+(eH?" hoy":"")+'"><div class="mhead">'+m.lbl+(eH?" ★":"")+'</div><div class="mbody">'+eh+'</div></div>'});document.getElementById("months").innerHTML=th;var cr=EVS.filter(function(e){return e.critico}).slice(0,2);var ch="";cr.forEach(function(e){var t=TIPOS[e.tipo]||TIPOS.interna;var cl=e.tipo==="externa"?"externa":"interna";var d=dH(e.fecha_inicio);var dL=d===null?"—":d>0?d:d===0?"0":"Pasada";var rc=rC(e);var ma=mAL(e.fecha_inicio);var dlb=e.tipo==="externa"?"Organismo":"Auditor líder";var dvl=e.tipo==="externa"?(e.organismo||"—"):(e.responsable||"—");ch+='<div class="card"><div class="ctop '+cl+'"><div class="cicon '+cl+'">'+t.icono+'</div><div class="cinfo"><div class="ctipo '+cl+'">'+t.titulo+'</div><div class="cfecha">'+rc+'</div><div class="cmes">'+ma+'</div></div><div class="ccount '+cl+'"><div class="cnum '+cl+'">'+dL+'</div><div class="clbl">días</div></div></div><div class="cbot"><div class="crow"><span class="clbl2">'+dlb+'</span><span class="cval">'+dvl+'</span></div><div class="crow"><span class="clbl2">Alcance</span><span class="cval">'+(e.alcance||"—")+'</span></div><div class="crow"><span class="clbl2">Tipo</span><span class="cval">'+(e.subtipo||"—")+'</span></div><div class="crow"><span class="clbl2">Duración</span><span class="cval">'+(e.duracion||"—")+'</span></div></div></div>'});document.getElementById("cards").innerHTML=ch;}init();</script></body></html>
