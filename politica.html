<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Política, Alcance y Objetivos · SGI NTT DATA</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F4F6FA;--card:#FFF;--border:#E2E8F2;--text:#1A2B42;--muted:#7A8CA0;--blue:#0067B1;--green:#0A7A5A;--red:#B52020;--amber:#B5751C}body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:12px;min-height:100vh;font-size:12px}.wrap{margin:0}.hdr{text-align:center;margin-bottom:18px}.hdr-tit{font-size:20px;font-weight:800;color:var(--text)}.hdr-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:"DM Mono",monospace}.pol{background:#fff;border:1px solid var(--border);border-radius:12px;padding:0;margin-bottom:14px;overflow:hidden}.pol-hdr{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}.pol-icono{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff}.pol-info{flex:1}.pol-norma{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase}.pol-tit{font-size:14px;font-weight:800;color:var(--text);margin-top:2px}.pol-body{padding:12px 16px}.pol-txt{font-size:12px;color:#556270;line-height:1.7;white-space:pre-wrap}.pol-comp{margin-top:14px;padding:12px 16px;background:#FAFBFD;border-radius:8px;border-left:3px solid currentColor}.pol-comp-tit{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}.pol-comp ul{margin:0;padding-left:18px;font-size:12px;color:#556270;line-height:1.7}.pol-alc{margin-top:14px;padding:14px 16px;background:#FAFBFD;border-radius:8px;border:1px solid var(--border)}.pol-alc-tit{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:currentColor;margin-bottom:6px}.pol-alc-tit::before{content:"📍 ";font-size:11px}.pol-alc-desc{font-size:12px;color:#556270;line-height:1.6;margin-bottom:8px}.pol-alc-row{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#556270;margin-top:4px}.pol-alc-row b{color:var(--text)}.obj{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px}.obj-hdr{font-size:14px;font-weight:800;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--blue);display:flex;align-items:center;gap:8px}.obj-grid{display:grid;grid-template-columns:1fr;gap:10px}.obj-card{padding:14px 16px;background:#FAFBFD;border:1px solid var(--border);border-radius:8px;border-left:4px solid var(--blue)}.obj-card.iso9001{border-left-color:var(--blue)}.obj-card.iso27001{border-left-color:var(--red)}.obj-card.iso20000{border-left-color:var(--green)}.obj-head{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}.obj-num{font-family:"DM Mono",monospace;font-size:11px;font-weight:800;background:var(--text);color:#fff;padding:2px 8px;border-radius:4px}.obj-norma{font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 8px;border-radius:4px}.obj-norma.iso9001{background:#DBEAFE;color:var(--blue)}.obj-norma.iso27001{background:#FDEAEA;color:var(--red)}.obj-norma.iso20000{background:#DCFCE7;color:var(--green)}.obj-tit{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:8px}.obj-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}@media(max-width:600px){.obj-grid2{grid-template-columns:1fr}}.obj-cell{font-size:11px;color:#556270;line-height:1.5}.obj-cell-lbl{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}.foot{text-align:center;font-size:10px;color:var(--muted);margin-top:18px;padding-top:12px;border-top:1px solid var(--border)}</style></head><body><div class="wrap"><div id="politicas"></div><div class="obj"><div class="obj-hdr">🎯 Objetivos del SGI <span id="objCnt" style="margin-left:auto;font-size:11px;color:#7A8CA0;font-weight:600;font-family:'DM Mono',monospace"></span></div><div class="obj-grid" id="objetivos"></div></div></div><script>var D={"politicas":[{"norma":"ISO 9001:2015","titulo":"Política de Calidad","icono":"📋","color":"#0067B1","texto":"La alta dirección de NTT DATA proporciona los recursos necesarios para establecer y operar un Sistema de Gestión de la Calidad para cumplir con los requisitos y expectativas de los clientes. NTT DATA considera las necesidades de nuestras partes interesadas, los aspectos internos y externos relevantes de nuestra organización que se encuentran alineadas con la estrategia de negocio.\n\nEl propósito del Sistema de Gestión de Calidad es cumplir con los objetivos establecidos, enfocados en ofrecer el mejor servicio hacia los clientes mediante la implementación de procesos que consideran la operación y la mejora continua.","compromisos":["Cumplir las exigencias del SGC ISO 9001:2015 y mejorar continuamente los procesos internos.","Cumplir con la satisfacción de los clientes mediante el cumplimiento de sus necesidades y expectativas.","Capacitar de manera permanente a todos sus trabajadores."],"alcance":{"sistema":"SGC","descripcion":"El alcance del Sistema de Gestión de la Calidad de NTT DATA incluye las operaciones necesarias dentro del proceso \"Quote to Cash\" para la entrega de servicios de TI gestionados globales, ciberseguridad, nube híbrida, centro de datos, redes, gestión de aplicaciones, automatización de datos y servicios en el lugar de trabajo.","sitio":"Av. Paseo de la Reforma #505 piso 43 suite A","exclusiones":"7.1.5.2 Trazabilidad de las mediciones · 8.2.5.3 Propiedad perteneciente a los clientes o proveedores externos"}},{"norma":"ISO 20000-1:2018","titulo":"Política de Gestión del Servicio","icono":"🔧","color":"#0A7A5A","texto":"NTT DATA promueve, a través de esta Política, una cultura enfocada en la planificación, coordinación, implementación y seguimiento de los servicios, la satisfacción del cliente, el cumplimiento de los requisitos legales, contractuales y de normas aplicables. Incluye monitoreo y revisión constantes del estado del servicio para garantizar que la calidad y la experiencia del cliente se mantengan y mejoren.","compromisos":["Cumplir las exigencias del SGS ISO/IEC 20000-1:2018 y mejorar continuamente los procesos internos.","Cumplir con la satisfacción de los clientes mediante el cumplimiento de sus necesidades y expectativas.","Capacitar de manera permanente a todos sus trabajadores.","Mejorar continuamente el SGS mediante seguimiento a indicadores, planeación e implementación de acciones de mejora."],"alcance":{"sistema":"SGS","descripcion":"El alcance del Sistema de Gestión del Servicio incluye las operaciones que se realizan dentro del entorno del Centro de Monitoreo SOC — Servicio de \"Monitoring Services (SOC)\".","sitio":"Centro de Monitoreo SOC — Av. Paseo de la Reforma #505 piso 43 suite A","exclusiones":"No existen exclusiones."}},{"norma":"ISO 27001:2022","titulo":"Política de Seguridad de la Información","icono":"🔒","color":"#B52020","texto":"La alta dirección de NTT DATA proporciona los recursos necesarios para establecer y operar un Sistema de Gestión de Seguridad de la Información para mantener la confidencialidad, integridad y disponibilidad de la información. NTT DATA considera las necesidades de las partes interesadas, los aspectos internos y externos relevantes alineados con la estrategia de negocio.\n\nEl propósito del SGSI es cumplir con los objetivos establecidos, enfocados en proteger la información mediante la implementación de planes de tratamiento que consideran controles físicos, administrativos y técnicos de seguridad.\n\nLa alta dirección se compromete a revisar y mejorar los controles y procesos de Seguridad de la Información mediante la actualización de la valoración de riesgos, establecimiento de políticas, realización de auditorías internas, revisiones por la dirección e implementación de acciones de mejora.","compromisos":[],"alcance":{"sistema":"SGSI","descripcion":"El SGSI aplica para el Centro de Monitoreo SOC de NTT DATA, de acuerdo con la declaración de aplicabilidad SoA vigente.","sitio":"Centro de Monitoreo SOC","exclusiones":"Controles tecnológicos — 8.25 Desarrollo Seguro del ciclo · 8.27 Principios de arquitectura en ingeniería en sistemas seguros · 8.28 Codificación Segura · 8.29 Pruebas de Seguridad para el desarrollo y aceptación · 8.30 Desarrollo de subcontratación"}}],"objetivos":[{"id":0,"norma":"ISO 9001","num":1,"objetivo":"Mapear y documentar el 100% de los procesos clave de la organización","meta":"Identificar, mapear y documentar el 100% de los procesos operativos, comerciales, administrativos y de soporte antes del cierre de marzo 2026.","indicador":"Porcentaje de procesos mapeados y documentados respecto al total estimado.","periodo":"Semestral","acciones_s1":"Realizar un diagnóstico inicial para identificar todos los procesos críticos para alcance (quote to cash).\nAsignar responsables por área para liderar el mapeo de procesos.","responsable_s1":"Adriana Reyes","recursos_s1":"Herramientas SIPOC y BPMN","acciones_s2":"Validar los procesos con los equipos involucrados y almacenarlos en un repositorio accesible.\nEstablecer un procedimiento para revisión y actualización periódica.","responsable_s2":"Mizraim Alcázar","recursos_s2":"Herramientas SIPOC y BPMN","valor_plan_s1":"50%","valor_real_s1":"50%","valor_plan_s2":"100%","valor_real_s2":"75%","cumplimiento_s1":"","cumplimiento_s2":"","observaciones":"","valor_plan":"100%","valor_real":"78%","cumplimiento":75},{"id":1,"norma":"ISO 9001","num":2,"objetivo":"Establecer indicadores de desempeño para procesos y proyectos","meta":"Definir e implementar al menos 10 indicadores clave de desempeño (KPIs) para procesos y proyectos antes del fin de marzo 2026.","indicador":"Número de KPIs definidos, implementados y reportados trimestralmente.","periodo":"Semestral","acciones_s1":"Identificar los procesos críticos que requieren medición.\nEstablecer KPIs alineados con los objetivos estratégicos (tiempo de entrega, satisfacción del cliente, eficiencia operativa).","responsable_s1":"Adriana Reyes","recursos_s1":"Excel, Power BI","acciones_s2":"Diseñar dashboards para visualización de resultados.\nCapacitar a los líderes de área en análisis de KPIs.\nReuniones trimestrales para revisión y toma de decisiones basada en datos.","responsable_s2":"Mizraim Alcázar","recursos_s2":"Excel, Power BI","valor_plan_s1":"50%","valor_real_s1":"50%","valor_plan_s2":"100%","valor_real_s2":"80%","cumplimiento_s1":"","cumplimiento_s2":"","observaciones":"","valor_plan":"10","valor_real":"7","cumplimiento":80},{"id":2,"norma":"ISO 9001","num":3,"objetivo":"Implementar un sistema de control de calidad en los proyectos de integración tecnológica","meta":"Diseñar e implementar un sistema de control de calidad que se aplique al 100% de los proyectos durante fiscal year 2026.","indicador":"Porcentaje de proyectos que incluyen checklist de calidad y validación técnica antes de la entrega.","periodo":"Semestral","acciones_s1":"Definir criterios de calidad específicos para proyectos y servicios de gran complejidad, intercompañías, globales, etc.","responsable_s1":"Adriana Reyes","recursos_s1":"Excel, Power BI","acciones_s2":"Crear listas de verificación para revisión técnica, funcional y documental.\nCapacitar al equipo técnico en el uso del sistema de control de calidad.\nImplementar en al menos el 50% de los proyectos complejos en 2026.\nRecopilar retroalimentación de clientes para ajustar el sistema.","responsable_s2":"Mizraim Alcázar","recursos_s2":"Excel, Power BI","valor_plan_s1":"50%","valor_real_s1":"50%","valor_plan_s2":"100%","valor_real_s2":"75%","cumplimiento_s1":"","cumplimiento_s2":"","observaciones":"","valor_plan":"100%","valor_real":"65%","cumplimiento":75},{"id":3,"norma":"ISO 27001","num":1,"objetivo":"Reducir incidentes de seguridad alto detectados por el SOC","meta":"Reducir en un 30% el número de incidentes de seguridad clasificados como \"Altos\" en el SOC en un periodo de 3 meses.","indicador":"Número de incidentes altos registrados en el SIEM.","periodo":"Semestral","acciones_s1":"Implementar reglas de seguridad enfocadas a las áreas involucradas en la operación del SOC, reglas de correlación, procedimientos de acceso, control de visitas.\nRealizar análisis de causa raíz de los incidentes críticos del semestre anterior.","responsable_s1":"Miguel Becerra","recursos_s1":"SIEM, herramientas SOC","acciones_s2":"Reforzar la capacitación hacia la organización en las políticas internas de seguridad física y perimetral.\nActualizar y reforzar controles técnicos como firewalls, IDS/IPS y segmentación de red.","responsable_s2":"Miguel Becerra","recursos_s2":"SIEM, herramientas SOC","valor_plan_s1":"50%","valor_real_s1":"50%","valor_plan_s2":"100%","valor_real_s2":"80%","cumplimiento_s1":"","cumplimiento_s2":"","observaciones":"","valor_plan":"30%","valor_real":"18%","cumplimiento":80},{"id":4,"norma":"ISO 27001","num":2,"objetivo":"Mantener la disponibilidad de los servicios monitoreados por el NOC","meta":"Alcanzar una disponibilidad promedio del 99.9% en los servicios críticos monitoreados por el NOC durante el semestre.","indicador":"Porcentaje de disponibilidad mensual de cada servicio crítico, consolidado semestralmente.","periodo":"Semestral","acciones_s1":"Implementar redundancia en los sistemas con mayor índice de fallos.\nRealizar mantenimiento preventivo anual en infraestructura por segmentos.","responsable_s1":"Miguel Becerra","recursos_s1":"Infraestructura NOC","acciones_s2":"Optimizar los procesos de escalamiento y resolución de fallas.\nIntegrar monitoreo predictivo para detectar anomalías antes de que afecten la disponibilidad.\nGenerar estadística de interrupciones en los servicios públicos.","responsable_s2":"Miguel Becerra","recursos_s2":"Infraestructura NOC","valor_plan_s1":"50%","valor_real_s1":"50%","valor_plan_s2":"100%","valor_real_s2":"80%","cumplimiento_s1":"","cumplimiento_s2":"","observaciones":"","valor_plan":"99.9%","valor_real":"99.7%","cumplimiento":80},{"id":5,"norma":"ISO 27001","num":3,"objetivo":"Optimizar la gestión de accesos privilegiados en sistemas críticos del SOC y NOC","meta":"Reducir en un 20% los accesos privilegiados innecesarios en sistemas críticos del SOC y NOC en un plazo de seis meses.","indicador":"Número de accesos con privilegios sin justificación documentada, según auditoría interna semestral.","periodo":"Semestral","acciones_s1":"Realizar un inventario completo de accesos privilegiados en sistemas críticos.\nImplementar un proceso de revisión y aprobación de accesos.\nFormalizar el proceso de acceso al SITE.","responsable_s1":"Miguel Becerra","recursos_s1":"AD, herramientas de gestión de accesos","acciones_s2":"Integrar controles de acceso basados en roles (RBAC) y el principio de mínimo privilegio.\nAutomatizar alertas para accesos privilegiados no autorizados o fuera de horario.\nCapacitar al personal técnico sobre buenas prácticas de gestión de identidades y accesos.","responsable_s2":"Miguel Becerra","recursos_s2":"AD, herramientas de gestión de accesos","valor_plan_s1":"50%","valor_real_s1":"50%","valor_plan_s2":"100%","valor_real_s2":"75%","cumplimiento_s1":"","cumplimiento_s2":"","observaciones":"","valor_plan":"20%","valor_real":"12%","cumplimiento":75},{"id":6,"norma":"ISO 20000-1","num":1,"objetivo":"Reducir el tiempo promedio de resolución de incidentes de disponibilidad (MTTR)","meta":"Disminuir el MTTR en un 10% respecto al acordado.","indicador":"Tiempo promedio de resolución de incidentes registrados en el sistema de gestión de servicios.","periodo":"Trimestral","acciones_s1":"Capacitar al personal del SOC y NOC en procedimientos de resolución rápida.\nOptimizar el flujo de escalamiento entre niveles de soporte.","responsable_s1":"Miguel Becerra","recursos_s1":"Sistema de gestión de servicios","acciones_s2":"Robustecer el método de clasificación y asignación de tickets.\nRealizar análisis post-mortem de incidentes críticos para identificar mejoras.","responsable_s2":"Miguel Becerra","recursos_s2":"Sistema de gestión de servicios","valor_plan_s1":"50%","valor_real_s1":"50%","valor_plan_s2":"100%","valor_real_s2":"80%","cumplimiento_s1":"","cumplimiento_s2":"","observaciones":"","valor_plan":"10%","valor_real":"8%","cumplimiento":80},{"id":7,"norma":"ISO 20000-1","num":2,"objetivo":"Optimizar la gestión de cambios en los servicios monitoreados","meta":"Reducir en un 20% los cambios urgentes o no planificados respecto al semestre anterior.","indicador":"Número de cambios urgentes registrados en el sistema de gestión de servicios.","periodo":"Trimestral","acciones_s1":"Implementar un formato óptimo para documentar los cambios (RFC).\nActualizar el procedimiento y el formato de informe / memoria técnico del cambio.","responsable_s1":"","recursos_s1":"","acciones_s2":"Capacitar al personal en gestión de cambios según ITIL.\nRealizar auditorías internas para identificar causas raíz de cambios no planificados.","responsable_s2":"","recursos_s2":"","valor_plan_s1":"50%","valor_real_s1":"50%","valor_plan_s2":"100%","valor_real_s2":"75%","cumplimiento_s1":"","cumplimiento_s2":"","observaciones":"","valor_plan":"20%","valor_real":"11%","cumplimiento":75}]};function dlim(s){return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}function normaCls(n){var x=(n||"").toLowerCase();if(x.indexOf("9001")>=0)return "iso9001";if(x.indexOf("27001")>=0)return "iso27001";if(x.indexOf("20000")>=0)return "iso20000";return ""}function init(){var ph="";D.politicas.forEach(function(p){var comp = p.compromisos.length ? '<div class="pol-comp" style="color:'+p.color+'"><div class="pol-comp-tit">NTT DATA se compromete a:</div><ul>'+p.compromisos.map(function(c){return '<li>'+dlim(c)+'</li>'}).join("")+'</ul></div>' : "";ph+='<div class="pol"><div class="pol-hdr"><div class="pol-icono" style="background:'+p.color+'">'+p.icono+'</div><div class="pol-info"><div class="pol-norma" style="color:'+p.color+'">'+dlim(p.norma)+'</div><div class="pol-tit">'+dlim(p.titulo)+'</div></div></div><div class="pol-body"><div class="pol-txt">'+dlim(p.texto)+'</div>'+comp+'<div class="pol-alc" style="color:'+p.color+'"><div class="pol-alc-tit">Alcance del '+dlim(p.alcance.sistema)+'</div><div class="pol-alc-desc">'+dlim(p.alcance.descripcion)+'</div><div class="pol-alc-row"><span><b>Sitio:</b> '+dlim(p.alcance.sitio)+'</span></div><div class="pol-alc-row"><span><b>Exclusiones:</b> '+dlim(p.alcance.exclusiones)+'</span></div></div></div></div>';});document.getElementById("politicas").innerHTML=ph;document.getElementById("objCnt").textContent=D.objetivos.length+" objetivos";var oh="";D.objetivos.forEach(function(o){var nc=normaCls(o.norma);oh+='<div class="obj-card '+nc+'"><div class="obj-head"><span class="obj-num">OBJ-'+(o.num||(o.id+1))+'</span><span class="obj-norma '+nc+'">'+dlim(o.norma)+'</span></div><div class="obj-tit">'+dlim(o.objetivo)+'</div><div class="obj-cell"><div class="obj-cell-lbl">Meta</div>'+dlim(o.meta||"—")+'</div><div class="obj-grid2"><div class="obj-cell"><div class="obj-cell-lbl">Indicador</div>'+dlim(o.indicador||"—")+'</div><div class="obj-cell"><div class="obj-cell-lbl">Periodo</div>'+dlim(o.periodo||"—")+'</div></div></div>';});document.getElementById("objetivos").innerHTML=oh||'<div style="padding:20px;text-align:center;color:#B0BDC9;font-size:12px;font-style:italic">Sin objetivos registrados</div>';}init();</script></body></html>
