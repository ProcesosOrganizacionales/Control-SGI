<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portal del SGI</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F4F6FA;--card:#FFF;--border:#E2E8F2;--text:#1A2B42;--muted:#7A8CA0;--green:#0A7A5A;--blue:#0067B1;--amber:#B5751C;--red:#B52020;--purple:#5A28A8;--teal:#00B8C8}body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:12px;min-height:100vh;font-size:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}@media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:500px){.grid{grid-template-columns:1fr}}.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:10px;transition:all .15s;cursor:pointer;border-top:3px solid var(--blue);position:relative}.card:hover{box-shadow:0 4px 12px rgba(11,31,58,.1);transform:translateY(-1px)}.card.calendario{border-top-color:var(--blue)}.card.avance{border-top-color:var(--teal)}.card.hallazgos{border-top-color:var(--amber)}.card.riesgos{border-top-color:var(--red)}.card.cambios{border-top-color:var(--purple)}.card.revision{border-top-color:#1A3550}.card.responsables{border-top-color:var(--green)}.card.politica{border-top-color:var(--purple)}.icono{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}.icono.calendario{background:#EBF4FD}.icono.avance{background:#E1F8FA}.icono.hallazgos{background:#FEF3C7}.icono.riesgos{background:#FDEAEA}.icono.cambios{background:#EDE9FE}.icono.revision{background:#E2E8F2}.icono.responsables{background:#DCFCE7}.icono.politica{background:#EDE9FE}.tit{font-size:13px;font-weight:800;color:var(--text);line-height:1.3}.desc{font-size:10px;color:var(--muted);line-height:1.4;flex:1}.stats{padding-top:10px;border-top:1px solid var(--border);margin-top:auto}.stats-num{font-size:22px;font-weight:800;line-height:1;color:var(--text);font-family:"DM Mono",monospace}.stats-num.calendario{color:var(--blue)}.stats-num.avance{color:var(--teal)}.stats-num.hallazgos{color:var(--amber)}.stats-num.riesgos{color:var(--red)}.stats-num.cambios{color:var(--purple)}.stats-num.responsables{color:var(--green)}.stats-num.politica{color:var(--purple)}.stats-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}.stats-sub{font-size:10px;color:#556270;margin-top:4px;line-height:1.3}.arrow{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;color:var(--muted);opacity:.6}.card:hover .arrow{color:var(--blue);opacity:1}</style></head><body><div class="grid" id="grid"></div><script>var D={"links":{"calendario":"https://procesosorganizacionales.github.io/Control-SGI/calendario.html","avance":"https://procesosorganizacionales.github.io/Control-SGI/avances.html","hallazgos":"https://procesosorganizacionales.github.io/Control-SGI/hallazgos.html","riesgos":"https://procesosorganizacionales.github.io/Control-SGI/riesgos.html","cambios":"https://procesosorganizacionales.github.io/Control-SGI/cambios.html","revision":"https://procesosorganizacionales.github.io/Control-SGI/revision.html","responsables":"https://procesosorganizacionales.github.io/Control-SGI/responsables.html","politica":"https://procesosorganizacionales.github.io/Control-SGI/politica.html"},"stats":{"calendario":{"num":"35d","lbl":"Auditoría Interna SGI","lbl2":"2026-07-13"},"avance":{"num":"54.2%","lbl":"13 áreas · 7 en riesgo","lbl2":"Promedio ponderado"},"hallazgos":{"num":23,"lbl":"23 cerrados · 0 abiertos","lbl2":"Total"},"riesgos":{"num":28,"lbl":"3 críticos · 11 moderados","lbl2":"Total"},"cambios":{"num":10,"lbl":"10 implementados · 0 en proceso","lbl2":"Total"},"revision":{"num":"RD-2026-01","lbl":"En preparación","lbl2":"Última revisión"},"responsables":{"num":18,"lbl":"1 líderes · 7 internos · 4 en formación","lbl2":"Personas SGI"},"politica":{"num":3,"lbl":"8 objetivos · 3 alcances","lbl2":"Políticas SGI"}}};var CARDS=[{k:"calendario",ico:"📅",tit:"Calendario SGI",desc:"Auditoría interna · Vigilancia externa · Cursos"},{k:"avance",ico:"📊",tit:"Avance por área",desc:"Cumplimiento ponderado Matriz · SOA · Tareas"},{k:"hallazgos",ico:"⚠️",tit:"Hallazgos",desc:"NCs, observaciones y oportunidades de mejora"},{k:"riesgos",ico:"🛡️",tit:"Riesgos",desc:"Gestión de riesgos y oportunidades · Cl. 6.1"},{k:"cambios",ico:"🔄",tit:"Cambios al SGI",desc:"Cambios legales · estructura · procesos · Cl. 6.3"},{k:"revision",ico:"📝",tit:"Revisión Dirección",desc:"Revisión por la alta dirección · Cl. 9.3"},{k:"responsables",ico:"👥",tit:"Responsables",desc:"Equipo SGI y auditores · Cl. 5.3"},{k:"politica",ico:"📋",tit:"Política & Objetivos",desc:"Políticas, alcance y objetivos del SGI"}];function dlim(s){return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}var h="";CARDS.forEach(function(c){var st=D.stats[c.k]||{num:"-",lbl:"",lbl2:""};h+='<a class="card '+c.k+'" href="'+D.links[c.k]+'" target="_top">';h+='<div class="icono '+c.k+'">'+c.ico+'</div>';h+='<div class="tit">'+c.tit+'</div>';h+='<div class="desc">'+c.desc+'</div>';h+='<div class="stats"><div class="stats-num '+c.k+'">'+dlim(st.num)+'</div>';h+='<div class="stats-lbl">'+dlim(st.lbl2||"")+'</div>';if(st.lbl)h+='<div class="stats-sub">'+dlim(st.lbl)+'</div>';h+='</div><span class="arrow">Abrir →</span></a>';});document.getElementById("grid").innerHTML=h;</script></body></html>
