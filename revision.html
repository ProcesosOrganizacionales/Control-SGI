<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Revisión por la Dirección · NTT DATA</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F4F6FA;--card:#FFF;--border:#E2E8F2;--text:#1A2B42;--muted:#7A8CA0;--green:#0A7A5A;--blue:#0067B1;--amber:#B5751C;--red:#B52020}body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:12px;min-height:100vh;font-size:12px}.wrap{margin:0}.hdr{text-align:center;margin-bottom:18px}.hdr-tit{font-size:20px;font-weight:800;color:var(--text)}.hdr-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:"DM Mono",monospace}.banner{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}@media(max-width:800px){.banner{grid-template-columns:1fr 1fr}}.bcell{padding:0}.blbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}.bval{font-size:14px;font-weight:700;color:var(--text);font-family:"DM Mono",monospace}.bval.estado{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px}.bval.estado.prep{background:#FEF3C7;color:#92400E}.bval.estado.realiz{background:#DCFCE7;color:var(--green)}.sect{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px}.sect-hdr{font-size:12px;font-weight:800;color:var(--text);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--blue);display:flex;align-items:center;gap:6px}.sect-hdr .cnt{margin-left:auto;font-size:11px;color:var(--muted);font-family:"DM Mono",monospace;font-weight:600}.asist{display:flex;flex-direction:column;gap:6px}.asist-item{padding:8px 12px;background:#FAFBFD;border-radius:6px;font-size:12px;color:var(--text);border-left:3px solid var(--blue)}.io-grid{display:grid;grid-template-columns:1fr;gap:8px}.io-item{background:#FAFBFD;border:1px solid var(--border);border-radius:8px;padding:12px 14px}.io-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}.io-lbl{font-size:12px;font-weight:700;color:var(--text);flex:1}.io-status{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px}.io-status.listo{background:#DCFCE7;color:var(--green)}.io-status.pendiente{background:#FEF3C7;color:#92400E}.io-cnt{font-size:12px;color:#556270;line-height:1.5}.io-cnt.empty{color:#B0BDC9;font-style:italic}.io-ev{font-size:10px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);font-family:"DM Mono",monospace}.acuerdos-tabla{width:100%;border-collapse:collapse;font-size:12px}.acuerdos-tabla th{background:#FAFBFD;color:var(--text);padding:8px 10px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid var(--border)}.acuerdos-tabla td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}.tag-est{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;display:inline-block}.tag-est.abierto{background:#FEF3C7;color:#92400E}.tag-est.cerrado{background:#DCFCE7;color:var(--green)}.tag-est.proceso{background:#DBEAFE;color:var(--blue)}.foot{text-align:center;font-size:10px;color:var(--muted);margin-top:18px;padding-top:12px;border-top:1px solid var(--border)}</style></head><body><div class="wrap"><div class="banner" id="banner"></div><div class="sect"><div class="sect-hdr">👥 Asistentes <span class="cnt" id="asistCnt"></span></div><div class="asist" id="asist"></div></div><div class="sect"><div class="sect-hdr">📥 Inputs (Entradas Cl. 9.3.2) <span class="cnt" id="inCnt"></span></div><div class="io-grid" id="inputs"></div></div><div class="sect"><div class="sect-hdr">📤 Outputs (Salidas Cl. 9.3.3) <span class="cnt" id="outCnt"></span></div><div class="io-grid" id="outputs"></div></div><div class="sect"><div class="sect-hdr">✅ Acuerdos <span class="cnt" id="acCnt"></span></div><div id="acuerdos"></div></div></div><script>var D={"rd":{"folio":"RD-2026-01","fecha_programada":"","fecha_ejecucion":"","lugar":"","estado":"En preparación","convocante":"José Luis Rodríguez — Representante de la Dirección","asistentes":["José Luis Rodríguez — Director de Operaciones","Mizraim Alcázar — Coordinadora SGI","Adriana Reyes — Responsable ISO 9001","Antonio Lazcano — Responsable ISO 20000-1 / 27001","",""],"inputs":{"acuerdos_previos":{"texto":"","evidencia":"","listo":false},"contexto_externo":{"texto":"","evidencia":"","listo":false},"contexto_interno":{"texto":"","evidencia":"","listo":false},"partes_interesadas":{"texto":"","evidencia":"","listo":false},"recursos":{"texto":"","evidencia":"","listo":false},"riesgos_oportunidades":{"texto":"","evidencia":"","listo":false},"mejoras":{"texto":"","evidencia":"","listo":false},"satisfaccion_cliente":{"texto":"","evidencia":"","listo":false},"desempenio_procesos":{"texto":"","evidencia":"","listo":false},"no_conformidades":{"texto":"","evidencia":"","listo":false},"auditoria_interna":{"texto":"","evidencia":"","listo":false},"proveedores":{"texto":"","evidencia":"","listo":false},"sla_desempenio":{"texto":"","evidencia":"","listo":false},"incidentes_cambios":{"texto":"","evidencia":"","listo":false},"capacidad_disponibilidad":{"texto":"","evidencia":"","listo":false},"riesgos_sgsi":{"texto":"","evidencia":"","listo":false},"soa_controles":{"texto":"","evidencia":"","listo":false},"amenazas":{"texto":"","evidencia":"","listo":false}},"outputs":{"mejoras_oportunidades":"","cambios_sgi":"","recursos_necesarios":""},"acuerdos":[]},"labels_in":{"acuerdos_previos":"Acuerdos previos","contexto_externo":"Contexto externo","contexto_interno":"Contexto interno","partes_interesadas":"Partes interesadas","recursos":"Recursos","riesgos_oportunidades":"Riesgos y oportunidades","mejoras":"Mejoras","satisfaccion_cliente":"Satisfacción del cliente","desempenio_procesos":"Desempeño de procesos","no_conformidades":"No conformidades","auditoria_interna":"Auditoría interna","proveedores":"Proveedores","sla_desempenio":"SLA y desempeño","incidentes_cambios":"Incidentes y cambios","capacidad_disponibilidad":"Capacidad y disponibilidad","riesgos_sgsi":"Riesgos SGSI","soa_controles":"SOA y controles 27001","incidentes_seguridad":"Incidentes de seguridad","vulnerabilidades":"Vulnerabilidades","cumplimiento_legal":"Cumplimiento legal"},"labels_out":{"decisiones_mejora":"Decisiones de mejora","cambios_sgi":"Cambios al SGI","recursos_aprobados":"Recursos aprobados","conclusiones":"Conclusiones generales","proximas_acciones":"Próximas acciones"}};var R=D.rd;function dlim(s){return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}function estCls(e){var x=(e||"").toLowerCase();if(x.indexOf("prep")>=0||x.indexOf("pendi")>=0)return "prep";if(x.indexOf("realiz")>=0||x.indexOf("cerrad")>=0)return "realiz";return "prep"}function init(){document.getElementById("banner").innerHTML='<div class="bcell"><div class="blbl">Folio</div><div class="bval">'+dlim(R.folio||"—")+'</div></div><div class="bcell"><div class="blbl">Estado</div><div class="bval estado '+estCls(R.estado)+'">'+dlim(R.estado||"—")+'</div></div><div class="bcell"><div class="blbl">Fecha programada</div><div class="bval">'+dlim(R.fecha_programada||"—")+'</div></div><div class="bcell"><div class="blbl">Fecha ejecución</div><div class="bval">'+dlim(R.fecha_ejecucion||"Pendiente")+'</div></div>';var conv = R.convocante ? '<div class="asist-item" style="border-left-color:#B52020"><b>Convocante:</b> '+dlim(R.convocante)+'</div>' : "";var asist = (R.asistentes||[]).filter(function(a){return a && a.trim()});document.getElementById("asistCnt").textContent=asist.length+" asistente(s)";document.getElementById("asist").innerHTML=conv+asist.map(function(a){return '<div class="asist-item">'+dlim(a)+'</div>'}).join("");function renderIO(obj,labels,destId,cntId){var entries=Object.entries(obj||{});var listos=entries.filter(function(e){return e[1] && e[1].listo}).length;document.getElementById(cntId).textContent=listos+" / "+entries.length+" completados";var h="";entries.forEach(function(e){var key=e[0]; var item=e[1]||{};var lbl=labels[key]||key;var st=item.listo?'<span class="io-status listo">✓ Listo</span>':'<span class="io-status pendiente">⏳ Pendiente</span>';var txt=item.texto?'<div class="io-cnt">'+dlim(item.texto)+'</div>':'<div class="io-cnt empty">— Sin información registrada —</div>';var ev=item.evidencia?'<div class="io-ev">📎 Evidencia: '+dlim(item.evidencia)+'</div>':"";h+='<div class="io-item"><div class="io-head"><div class="io-lbl">'+lbl+'</div>'+st+'</div>'+txt+ev+'</div>';});document.getElementById(destId).innerHTML=h;}renderIO(R.inputs,D.labels_in,"inputs","inCnt");renderIO(R.outputs,D.labels_out,"outputs","outCnt");var ac=R.acuerdos||[];document.getElementById("acCnt").textContent=ac.length+" acuerdo(s)";if(!ac.length){document.getElementById("acuerdos").innerHTML='<div style="padding:14px;text-align:center;color:#B0BDC9;font-size:12px;font-style:italic">Sin acuerdos registrados aún</div>';return}var ah='<table class="acuerdos-tabla"><thead><tr><th>#</th><th>Acuerdo</th><th>Responsable</th><th>Fecha compromiso</th><th>Estado</th></tr></thead><tbody>';ac.forEach(function(a,i){var ec=(a.estado||"").toLowerCase().indexOf("cerrad")>=0?"cerrado":(a.estado||"").toLowerCase().indexOf("proces")>=0?"proceso":"abierto";ah+='<tr><td>'+(i+1)+'</td><td>'+dlim(a.acuerdo||a.descripcion||"")+'</td><td>'+dlim(a.responsable||"")+'</td><td>'+dlim(a.fecha_compromiso||a.fecha||"")+'</td><td><span class="tag-est '+ec+'">'+dlim(a.estado||"")+'</span></td></tr>'});ah+='</tbody></table>';document.getElementById("acuerdos").innerHTML=ah;}init();</script></body></html>
